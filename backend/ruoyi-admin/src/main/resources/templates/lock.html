<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:content="${session.csrf_token}" name="csrf-token" />
    <title>系统锁定 - 设备维保监控中心</title>
    <link th:href="@{favicon.ico}" rel="shortcut icon" />
    <link href="../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet" />
    <link href="../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

        body.lockscreen {
            background-color: #0f172a;
            background-image:
                linear-gradient(rgba(30, 41, 59, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
            background-size: 30px 30px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            color: #e2e8f0;
            position: relative;
        }

        /* Scanline effect */
        body.lockscreen::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .lockscreen-wrapper {
            width: 480px;
            max-width: 90%;
            position: relative;
            z-index: 20;
        }

        /* HUD Card Design */
        .maintenance-card {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid #334155;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        /* HUD Corner Accents */
        .maintenance-card::before,
        .maintenance-card::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #0ea5e9;
            /* Cyan */
            transition: all 0.3s ease;
        }

        .maintenance-card::before {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
        }

        .maintenance-card::after {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
        }

        .card-corners-2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .card-corners-2::before,
        .card-corners-2::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #0ea5e9;
        }

        .card-corners-2::before {
            top: -2px;
            right: -2px;
            border-left: none;
            border-bottom: none;
        }

        .card-corners-2::after {
            bottom: -2px;
            left: -2px;
            border-right: none;
            border-top: none;
        }

        /* Header / Status Bar */
        .system-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .system-title {
            font-size: 16px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .system-status {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #10b981;
            /* Green */
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        /* Clock */
        .clock-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .lockscreen-time {
            font-family: 'Share Tech Mono', monospace;
            font-size: 80px;
            color: #e2e8f0;
            text-shadow: 0 0 15px rgba(226, 232, 240, 0.3);
            line-height: 1;
        }

        .lockscreen-date {
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            color: #0ea5e9;
            /* Cyan */
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* User Info */
        .user-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .lockscreen-image img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #334155;
            padding: 3px;
            background: #0f172a;
        }

        .lockscreen-name {
            margin-top: 15px;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .user-role {
            font-size: 14px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Input Form */
        .lockscreen-credentials {
            position: relative;
        }

        .lockscreen-credentials .form-control {
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            height: 50px;
            border-radius: 4px;
            padding-left: 20px;
            padding-right: 50px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
        }

        .lockscreen-credentials .form-control:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
        }

        .input-group-btn {
            position: absolute;
            right: 5px;
            top: 5px;
        }

        .input-group-btn .btn {
            background: #0ea5e9;
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .input-group-btn .btn:hover {
            background: #0284c7;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.4);
        }

        /* Footer */
        .lockscreen-footer {
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #334155;
            padding-top: 15px;
        }

        .lockscreen-footer a {
            color: #94a3b8;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .lockscreen-footer a:hover {
            color: #0ea5e9;
        }

        /* Decorative Tech Elements */
        .tech-lines {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #334155, transparent);
        }

        .tech-data {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: #475569;
            text-align: right;
        }
    </style>
</head>

<body class="lockscreen">
    <!-- Background Tech Elements -->
    <div class="tech-data">
        SYS.ID: 884-XJ<br>
        SEC.LVL: A-01
    </div>

    <div class="lockscreen-wrapper">
        <div class="maintenance-card">
            <div class="card-corners-2"></div>

            <div class="system-header">
                <div class="system-title"><i class="fa fa-shield"></i> 维保监控终端</div>
                <div class="system-status">
                    <div class="status-dot"></div> 系统正常
                </div>
            </div>

            <div class="clock-display">
                <div class="lockscreen-time"></div>
                <div class="lockscreen-date"></div>
            </div>

            <div class="user-info">
                <div class="lockscreen-image">
                    <img th:src="(${#strings.isEmpty(user.avatar)}) ? @{/img/profile.jpg} : @{${user.avatar}}"
                        th:onerror="this.src='img/profile.jpg'" alt="User Image">
                </div>
                <div class="lockscreen-name">[[ ${user.loginName} ]]</div>
                <div class="user-role">[[${#strings.defaultString(user.userName, '-')}]]</div>
            </div>

            <form class="lockscreen-credentials" method="post" action="#" onsubmit="return false;">
                <div class="input-group" style="position: relative;">
                    <input type="password" name="password" autocomplete="off" class="form-control"
                        placeholder="ACCESS CODE / 密码">
                    <div class="input-group-btn">
                        <button type="button" class="btn" onclick="unlock()"><i class="fa fa-arrow-right"></i></button>
                    </div>
                </div>
            </form>

            <div class="lockscreen-footer">
                <a th:href="@{logout}"><i class="fa fa-power-off"></i> 退出系统 / LOGOUT</a>
            </div>
        </div>
    </div>

    <script src="../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
    <script src="../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script src="../static/ruoyi/js/ry-ui.js" th:src="@{/ruoyi/js/ry-ui.js?v=4.8.2}"></script>
</body>
<script th:inline="javascript">
    var ctx = [[@{/}]];

    Date.prototype.format = function (fmt) {
        var o = {
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
            "q+": Math.floor((this.getMonth() + 3) / 3),
            "S": this.getMilliseconds()
        };
        if (/(y+)/.test(fmt)) {
            fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        }
        for (var k in o) {
            if (new RegExp("(" + k + ")").test(fmt)) {
                fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
            }
        }
        return fmt;
    }

    var weekDays = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];

    function updateTime() {
        var now = new Date();
        $('.lockscreen-time').text(now.format('hh:mm:ss'));
        $('.lockscreen-date').text(now.format('yyyy-MM-dd') + ' ' + weekDays[now.getDay()]);
    }

    $(function () {
        updateTime();
        setInterval(updateTime, 500);
    });

    $(document).keydown(function (event) {
        if (event.keyCode == 13) {
            unlock();
        }
    });

    function unlock() {
        var password = $("input[name='password']").val();
        if ($.common.isEmpty(password)) {
            $.modal.msg("请输入密码");
            return;
        }

        var index = "";
        var config = {
            url: ctx + "unlockscreen",
            type: "post",
            dataType: "json",
            data: { password: password },
            beforeSend: function (xhr) {
                var csrftoken = $('meta[name=csrf-token]').attr('content');
                xhr.setRequestHeader("X-CSRF-Token", csrftoken);
                index = layer.load(2, { shade: false });
            },
            success: function (result) {
                if (result.code == web_status.SUCCESS) {
                    location.href = ctx + 'index';
                } else {
                    $.modal.msg(result.msg);
                    $("input[name='password']").val("");
                }
                layer.close(index);
            }
        };
        $.ajax(config);
    };
</script>

</html>
