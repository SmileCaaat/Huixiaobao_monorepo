<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设备信息不存在</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 100%;
        }

        .error-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(238, 90, 90, 0.3);
        }

        .error-icon i {
            font-size: 50px;
            color: white;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 15px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .error-code {
            display: inline-block;
            background: #f8f9fa;
            color: #666;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .footer-info {
            margin-top: 40px;
            font-size: 12px;
            color: #aaa;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-5px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(5px);
            }
        }

        .error-icon {
            animation: shake 0.6s ease-in-out;
        }
    </style>
</head>

<body>
    <div class="error-container" xmlns:th="http://www.thymeleaf.org">
        <div class="error-icon">
            <i class="fas fa-exclamation"></i>
        </div>
        <h1 class="error-title">设备信息不存在</h1>
        <p class="error-message" th:text="${errorMsg ?: '该设备可能已被删除或编码有误，请确认二维码是否正确。'}">
            该设备可能已被删除或编码有误，请确认二维码是否正确。
        </p>
        <div class="error-code">
            <i class="fas fa-qrcode"></i> 请重新扫描有效的设备二维码
        </div>
        <div class="footer-info">
            <p><i class="fas fa-shield-alt"></i> 消防设备管理系统</p>
        </div>
    </div>
</body>

</html>
