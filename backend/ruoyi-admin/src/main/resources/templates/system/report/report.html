<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">

<head>
    <th:block th:include="include :: header('维保报告列表')" />
</head>

<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i
                                        class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i
                                        class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="generateReport()">
                    <i class="fa fa-plus"></i> 生成报告
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "system/report";

        $(function () {
            var options = {
                url: prefix + "/list",
                removeUrl: prefix + "/remove",
                modalName: "维保报告",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'fileName',
                    title: '文件名称'
                },
                {
                    field: 'createTime',
                    title: '生成时间',
                    formatter: function (value, row, index) {
                        if (!value) return "-";
                        var date = new Date(value);
                        var year = date.getFullYear();
                        var month = ("0" + (date.getMonth() + 1)).slice(-2);
                        var day = ("0" + date.getDate()).slice(-2);
                        var hour = ("0" + date.getHours()).slice(-2);
                        var minute = ("0" + date.getMinutes()).slice(-2);
                        var second = ("0" + date.getSeconds()).slice(-2);
                        return year + "-" + month + "-" + day + " " + hour + ":" + minute + ":" + second;
                    }
                },
                {
                    field: 'size',
                    title: '文件大小'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function (value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="downloadFile(\'' + row.fileName + '\')"><i class="fa fa-download"></i>下载</a> ');
                        actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="remove(\'' + row.fileName + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });

        function generateReport() {
            $.modal.confirm("确定要生成新的维保报告吗？", function () {
                $.operate.get(prefix + "/generate", function (result) {
                    if (result.code == 0) {
                        $.modal.msgSuccess("生成成功");
                        $.table.refresh();
                    } else {
                        $.modal.msgError(result.msg);
                    }
                });
            });
        }

        function downloadFile(fileName) {
            window.location.href = prefix + "/downloadFile?fileName=" + encodeURIComponent(fileName);
        }

        function remove(fileName) {
            $.modal.confirm("确定要删除该报告吗？", function () {
                $.operate.post(prefix + "/remove", { "fileName": fileName }, function (result) {
                    if (result.code == 0) {
                        $.modal.msgSuccess("删除成功");
                        $.table.refresh();
                    } else {
                        $.modal.msgError(result.msg);
                    }
                });
            });
        }
    </script>
</body>

</html>
