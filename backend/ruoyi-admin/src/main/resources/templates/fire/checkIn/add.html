<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:include="include :: header('新增签到')" />
    <th:block th:include="include :: bootstrap-fileinput-css" />
    <style>
        .image-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .image-preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(255, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
            line-height: 18px;
            text-align: center;
        }

        .image-preview-item .remove-btn:hover {
            background: rgba(255, 0, 0, 0.9);
        }

        .upload-btn-container {
            margin-top: 10px;
        }
    </style>
</head>

<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-checkIn-add">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">所属客户：</label>
                <div class="col-sm-8">
                    <select name="companyId" id="companyId" class="form-control" required>
                        <option value="">请选择公司</option>
                    </select>
                    <input type="hidden" name="companyName" id="companyName">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">任务名称：</label>
                <div class="col-sm-8">
                    <select name="taskId" class="form-control m-b" id="taskId" required disabled>
                        <option value="">请先选择客户</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">签到类型：</label>
                <div class="col-sm-8">
                    <select name="checkInType" class="form-control m-b" required
                        th:with="type=${@dict.getType('fire_check_in_type')}">
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}">
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">签到时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="checkInTime" class="form-control" placeholder="yyyy-MM-dd HH:mm:ss" type="text">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">地址录入方式：</label>
                <div class="col-sm-8">
                    <label class="radio-inline">
                        <input type="radio" name="addressMode" value="auto" checked> 自动定位
                    </label>
                    <label class="radio-inline">
                        <input type="radio" name="addressMode" value="manual"> 手动输入
                    </label>
                </div>
            </div>
            <div id="autoAddressPanel">
                <div class="form-group">
                    <label class="col-sm-3 control-label">当前位置：</label>
                    <div class="col-sm-8">
                        <button type="button" class="btn btn-info btn-sm" id="btnLocate"><i class="fa fa-map-marker"></i> 获取当前位置</button>
                        <span id="locateStatus" class="text-muted" style="margin-left:8px;">尚未定位</span>
                        <a href="javascript:void(0)" id="switchToManual" style="margin-left:8px;display:none;">切换为手动输入</a>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label">定位地址：</label>
                    <div class="col-sm-8">
                        <input name="locatedAddress" id="locatedAddress" class="form-control" type="text" readonly placeholder="定位成功后自动填写">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label">经度：</label>
                    <div class="col-sm-8">
                        <input name="longitude" id="longitude" class="form-control" type="text" readonly placeholder="自动填写">
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label">纬度：</label>
                    <div class="col-sm-8">
                        <input name="latitude" id="latitude" class="form-control" type="text" readonly placeholder="自动填写">
                    </div>
                </div>
            </div>
            <div id="manualAddressPanel" style="display:none;">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">详细签到地址：</label>
                    <div class="col-sm-8">
                        <input name="manualAddress" id="manualAddress" class="form-control" type="text" placeholder="请输入详细签到地址">
                    </div>
                </div>
            </div>
            <input type="hidden" name="address" id="address">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">签到人：</label>
                <div class="col-sm-8">
                    <select name="userId" id="userId" class="form-control" required disabled>
                        <option value="">请先选择任务</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">签到图片：</label>
                <div class="col-sm-8">
                    <div class="upload-btn-container">
                        <input type="file" id="imageUpload" multiple accept="image/*" style="display: none;">
                        <button type="button" class="btn btn-primary btn-sm"
                            onclick="document.getElementById('imageUpload').click()">
                            <i class="fa fa-upload"></i> 上传图片
                        </button>
                        <span class="text-muted" style="margin-left: 10px;">支持多张图片上传</span>
                    </div>
                    <div class="image-preview-container" id="imagePreviewContainer"></div>
                    <input type="hidden" name="imageUrls" id="imageUrls">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" class="form-control" rows="3" placeholder="请输入备注信息"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: bootstrap-fileinput-js" />
    <th:block th:include="include :: datetimepicker-js" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/checkIn";
        var uploadedImages = [];
        var taskCache = {};
        var AMAP_KEY = '6f670a464ef6e3a67ddde17691a58b40';

        var urlParams = new URLSearchParams(window.location.search);
        var filterCompanyId = urlParams.get('companyId');
        var filterCompanyName = urlParams.get('companyName');

        $(function () {
            loadCompanyList();
            $("input[name='checkInTime']").datetimepicker({
                format: "yyyy-mm-dd hh:ii:ss",
                minView: "hour",
                autoclose: true,
                todayBtn: true,
                todayHighlight: true
            });
            var now = new Date();
            var formattedDate = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + ' ' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0') + ':' +
                String(now.getSeconds()).padStart(2, '0');
            $("input[name='checkInTime']").val(formattedDate);

            $('#imageUpload').on('change', function () {
                var files = this.files;
                for (var i = 0; i < files.length; i++) {
                    uploadImage(files[i]);
                }
                this.value = '';
            });

            $("input[name='addressMode']").on('change', function () {
                switchAddressMode($(this).val());
            });
            $('#btnLocate').on('click', locateCurrent);
            $('#switchToManual').on('click', function () {
                $("input[name='addressMode'][value='manual']").prop('checked', true).trigger('change');
            });
            $('#taskId').on('change', function () {
                fillUsersByTask($(this).val());
            });
            $("#form-checkIn-add").validate({ focusCleanup: true });
            switchAddressMode('auto');
        });

        function switchAddressMode(mode) {
            if (mode === 'auto') {
                $('#autoAddressPanel').show();
                $('#manualAddressPanel').hide();
                $('#manualAddress').val('').prop('disabled', true);
                $('#locatedAddress,#longitude,#latitude').prop('disabled', false);
            } else {
                $('#autoAddressPanel').hide();
                $('#manualAddressPanel').show();
                $('#manualAddress').prop('disabled', false);
                $('#locatedAddress').val('');
                $('#longitude').val('');
                $('#latitude').val('');
                $('#locateStatus').text('已切换为手动输入');
                $('#switchToManual').hide();
            }
        }

        function locateCurrent() {
            if (!navigator.geolocation) {
                $('#locateStatus').text('当前浏览器不支持定位');
                $('#switchToManual').show();
                $.modal.alertWarning('当前浏览器不支持定位，请改用手动输入地址');
                return;
            }
            if (!(location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
                $('#locateStatus').text('非 HTTPS 环境，定位可能不可用');
                $('#switchToManual').show();
            }
            $('#locateStatus').text('正在定位…');
            navigator.geolocation.getCurrentPosition(function (pos) {
                var lng = pos.coords.longitude;
                var lat = pos.coords.latitude;
                $('#longitude').val(lng);
                $('#latitude').val(lat);
                $('#locateStatus').text('定位成功，正在解析地址…');
                reverseGeocode(lng, lat);
            }, function (err) {
                var msg = '定位失败';
                if (err && err.code === 1) msg = '用户拒绝了定位权限';
                else if (err && err.code === 2) msg = '无法获取位置信息';
                else if (err && err.code === 3) msg = '定位超时';
                $('#locateStatus').text(msg);
                $('#switchToManual').show();
                $.modal.alertWarning(msg + '，可切换为手动输入地址');
            }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
        }

        function reverseGeocode(lng, lat) {
            $.ajax({
                url: 'https://restapi.amap.com/v3/geocode/regeo',
                type: 'GET',
                dataType: 'json',
                data: { key: AMAP_KEY, location: lng + ',' + lat, extensions: 'base' },
                success: function (response) {
                    if (response.status === '1' && response.regeocode && response.regeocode.formatted_address) {
                        $('#locatedAddress').val(response.regeocode.formatted_address);
                        $('#locateStatus').text('地址解析成功');
                    } else {
                        $('#locatedAddress').val('');
                        $('#locateStatus').text('逆地理编码失败');
                        $('#switchToManual').show();
                        $.modal.alertWarning('逆地理编码失败，请改用手动输入地址');
                    }
                },
                error: function () {
                    $('#locatedAddress').val('');
                    $('#locateStatus').text('逆地理编码请求失败');
                    $('#switchToManual').show();
                    $.modal.alertWarning('逆地理编码请求失败，请改用手动输入地址');
                }
            });
        }

        function loadCompanyList() {
            $.ajax({
                url: ctx + 'fire/company/all',
                type: 'POST',
                success: function (res) {
                    if (res.code == 0 && res.data) {
                        var html = '<option value="">请选择公司</option>';
                        res.data.forEach(function (company) {
                            var selected = filterCompanyId && company.companyId == filterCompanyId ? ' selected' : '';
                            html += '<option value="' + company.companyId + '" data-name="' + company.companyName + '"' + selected + '>' + company.companyName + '</option>';
                        });
                        $('#companyId').html(html);
                        if (filterCompanyId) {
                            if (filterCompanyName) {
                                $('#companyName').val(decodeURIComponent(filterCompanyName));
                            }
                            loadTasksByCompany(filterCompanyId);
                        }
                    }
                }
            });
        }

        $('#companyId').on('change', function () {
            var name = $(this).find('option:selected').data('name') || '';
            $('#companyName').val(name);
            var companyId = $(this).val();
            $('#taskId').val('');
            $('#userId').html('<option value="">请先选择任务</option>').prop('disabled', true).val('');
            loadTasksByCompany(companyId);
        });

        function loadTasksByCompany(companyId) {
            taskCache = {};
            if (!companyId) {
                $('#taskId').html('<option value="">请先选择客户</option>').prop('disabled', true);
                return;
            }
            $('#taskId').prop('disabled', true).html('<option value="">任务加载中……</option>');
            $.ajax({
                url: prefix + '/listTasksByCompany',
                type: 'POST',
                data: { companyId: companyId },
                success: function (res) {
                    if (res.code != 0) {
                        $('#taskId').html('<option value="">任务加载失败</option>').prop('disabled', true);
                        $.modal.alertError(res.msg || '任务加载失败');
                        return;
                    }
                    var list = res.data || [];
                    if (list.length === 0) {
                        $('#taskId').html('<option value="">暂无可用任务</option>').prop('disabled', true);
                        return;
                    }
                    var html = '<option value="">请选择任务</option>';
                    list.forEach(function (task) {
                        taskCache[String(task.taskId)] = task;
                        html += '<option value="' + task.taskId + '">' + task.taskName + '</option>';
                    });
                    $('#taskId').html(html).prop('disabled', false);
                },
                error: function () {
                    $('#taskId').html('<option value="">任务加载失败</option>').prop('disabled', true);
                    $.modal.alertError('任务加载失败');
                }
            });
        }

        function fillUsersByTask(taskId) {
            $('#userId').html('<option value="">请先选择任务</option>').prop('disabled', true).val('');
            if (!taskId || !taskCache[String(taskId)]) {
                return;
            }
            var task = taskCache[String(taskId)];
            var users = {};
            function addUser(id, name) {
                if (!id) return;
                users[String(id)] = name || ('用户' + id);
            }
            addUser(task.managerId, task.managerName);
            addUser(task.executorId, task.executorName);
            if (task.operatorIds) {
                var ids = String(task.operatorIds).split(',');
                var names = task.operatorNames ? String(task.operatorNames).split(',') : [];
                for (var i = 0; i < ids.length; i++) {
                    var id = $.trim(ids[i]);
                    if (id) addUser(id, names[i] ? $.trim(names[i]) : '');
                }
            }
            var keys = Object.keys(users);
            if (keys.length === 0) {
                $('#userId').html('<option value="">该任务暂无可选人员</option>').prop('disabled', true);
                return;
            }
            var html = '<option value="">请选择签到人</option>';
            keys.forEach(function (id) {
                html += '<option value="' + id + '">' + users[id] + '</option>';
            });
            $('#userId').html(html).prop('disabled', false);
        }

        function uploadImage(file) {
            var formData = new FormData();
            formData.append('file', file);
            $.ajax({
                url: ctx + 'common/upload',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function (result) {
                    if (result.code === 0) {
                        uploadedImages.push(result.url);
                        updateImagePreview();
                        updateImageUrls();
                    } else {
                        $.modal.alertError("图片上传失败：" + result.msg);
                    }
                },
                error: function () {
                    $.modal.alertError("图片上传失败，请稍后重试");
                }
            });
        }

        function updateImagePreview() {
            var container = $('#imagePreviewContainer');
            container.empty();
            for (var i = 0; i < uploadedImages.length; i++) {
                var item = $('<div class="image-preview-item"></div>');
                var img = $('<img>').attr('src', uploadedImages[i]);
                var removeBtn = $('<button class="remove-btn" type="button">&times;</button>')
                    .attr('data-index', i)
                    .on('click', function () {
                        removeImage($(this).attr('data-index'));
                    });
                item.append(img).append(removeBtn);
                container.append(item);
            }
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            updateImagePreview();
            updateImageUrls();
        }

        function updateImageUrls() {
            $('#imageUrls').val(uploadedImages.join(','));
        }

        function submitHandler() {
            var name = $('#companyId').find('option:selected').data('name') || '';
            $('#companyName').val(name);
            if (!$('#taskId').val()) {
                $.modal.alertWarning('请选择任务');
                return;
            }
            if ($('#taskId').prop('disabled')) {
                $.modal.alertWarning('当前无可用任务，不能提交');
                return;
            }
            if (!$('#userId').val()) {
                $.modal.alertWarning('请选择签到人');
                return;
            }
            var mode = $("input[name='addressMode']:checked").val();
            if (mode === 'auto') {
                if (!$('#longitude').val() || !$('#latitude').val() || !$.trim($('#locatedAddress').val())) {
                    $.modal.alertWarning('请获取当前位置或手动输入签到地址');
                    return;
                }
                $('#address').val($.trim($('#locatedAddress').val()));
                $('#manualAddress').val('');
            } else {
                var manual = $.trim($('#manualAddress').val());
                if (!manual) {
                    $.modal.alertWarning('请获取当前位置或手动输入签到地址');
                    return;
                }
                $('#address').val(manual);
                $('#longitude').val('');
                $('#latitude').val('');
                $('#locatedAddress').val('');
            }
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-checkIn-add').serialize());
            }
        }
    </script>
</body>

</html>
