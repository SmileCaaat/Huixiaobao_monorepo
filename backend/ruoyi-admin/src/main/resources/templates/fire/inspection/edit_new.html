<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改巡检登记')" />
    <th:block th:include="include :: datetimepicker-css" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-inspection-edit" th:object="${inspection}">
            <input type="hidden" name="inspectionId" th:field="*{inspectionId}" />
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">单位名称：</label>
                <div class="col-sm-8">
                    <select class="form-control" id="companyId" name="companyId" th:field="*{companyId}" required>
                        <option value="">请选择</option>
                        <option th:each="company : ${companies}" th:value="${company.companyId}"
                            th:text="${company.companyName}" th:data-name="${company.companyName}"></option>
                    </select>
                    <input type="hidden" id="companyName" name="companyName" th:field="*{companyName}" />
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">维保类型：</label>
                <div class="col-sm-8">
                    <div class="radio-box" th:each="dict : ${@dict.getType('fire_inspection_type')}">
                        <input type="radio" name="inspectionType" th:value="${dict.dictValue}"
                            th:id="${'inspectionType_'+dict.dictValue}"
                            th:checked="${inspection.inspectionType == dict.dictValue}">
                        <label th:for="${'inspectionType_'+dict.dictValue}" th:text="${dict.dictLabel}"></label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">建筑名称：</label>
                <div class="col-sm-8">
                    <select class="form-control" id="buildingId" name="buildingId" th:field="*{buildingId}" required>
                        <option value="">请选择</option>
                        <option th:each="building : ${buildings}" th:value="${building.buildingId}"
                            th:text="${building.buildingName}" th:data-name="${building.buildingName}"
                            th:data-company="${building.companyId}"></option>
                    </select>
                    <input type="hidden" id="buildingName" name="buildingName" th:field="*{buildingName}" />
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">所在楼层：</label>
                <div class="col-sm-8">
                    <input type="text" name="floor" th:field="*{floor}" class="form-control" placeholder="请输入所在楼层">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">系统名称：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="systemName" id="systemName" required>
                        <option value="">请选择</option>
                        <option th:each="type : ${systemTypes}" th:value="${type.typeName}"
                            th:data-type="${type.typeCode}" th:text="${type.typeName}"
                            th:selected="${inspection.systemName == type.typeName}"></option>
                    </select>
                    <input type="hidden" id="systemType" name="systemType" th:field="*{systemType}" />
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">设备名称：</label>
                <div class="col-sm-8">
                    <input type="text" name="equipmentName" th:field="*{equipmentName}" class="form-control"
                        placeholder="请输入设备名称" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">设备数量：</label>
                <div class="col-sm-8">
                    <input type="number" name="equipmentCount" th:field="*{equipmentCount}" class="form-control" min="1" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">具体位置：</label>
                <div class="col-sm-8">
                    <input type="text" name="location" th:field="*{location}" class="form-control" placeholder="请输入具体位置"
                        maxlength="200" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">巡检时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input type="text" name="inspectionTime" class="form-control" id="inspectionTime"
                            th:value="${#dates.format(inspection.inspectionTime, 'yyyy-MM-dd HH:mm:ss')}" required>
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">设备状态：</label>
                <div class="col-sm-8">
                    <div class="onoffswitch">
                        <input type="checkbox" class="onoffswitch-checkbox" id="equipmentStatusSwitch"
                            th:checked="${inspection.equipmentStatus == '0'}">
                        <label class="onoffswitch-label" for="equipmentStatusSwitch">
                            <span class="onoffswitch-inner"></span>
                            <span class="onoffswitch-switch"></span>
                        </label>
                    </div>
                    <input type="hidden" name="equipmentStatus" id="equipmentStatus" th:field="*{equipmentStatus}">
                    <span id="statusText" style="margin-left: 10px;"
                        th:style="${inspection.equipmentStatus == '0'} ? 'color: green;' : 'color: red;'"
                        th:text="${inspection.equipmentStatus == '0'} ? '正常' : '异常'">正常</span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">上传图片：</label>
                <div class="col-sm-8">
                    <input type="hidden" name="imageUrls" id="imageUrls" th:value="${inspection.imageUrls}">
                    <input type="file" id="simpleUpload" multiple accept="image/*" class="form-control">
                    <small class="help-block">支持jpg、jpeg、png、gif格式，最多上传5张图片</small>
                    <div id="existingImages" style="margin-top:10px;"></div>
                    <div id="preview" style="margin-top:10px;"></div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">详细备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" th:field="*{remark}" class="form-control" rows="3" maxlength="500"
                        placeholder="请输入详细备注"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: datetimepicker-js" />
    <script th:inline="javascript">
        console.log('=== EDIT SIMPLE UPLOAD VERSION 1.0 ===');
        var prefix = ctx + "fire/inspection";
        var existingImageUrls = /*[[${inspection.imageUrls}]]*/ '';
        var uploadedImages = [];

        $(function () {
            // 初始化已有图片
            if (existingImageUrls && existingImageUrls.trim() !== '') {
                uploadedImages = existingImageUrls.split(',').map(function(url) {
                    return url.trim();
                }).filter(function(url) {
                    return url !== '';
                });
                console.log('Existing images:', uploadedImages);
                
                // 显示已有图片
                var html = '<div><strong>已上传的图片：</strong></div>';
                for (var i = 0; i < uploadedImages.length; i++) {
                    html += '<div style="display:inline-block;margin:5px;padding:5px;border:1px solid #ddd;border-radius:3px;">';
                    html += '<span>图片' + (i+1) + '</span> ';
                    html += '<button type="button" class="btn btn-xs btn-danger" onclick="removeImage(' + i + ')">删除</button>';
                    html += '</div>';
                }
                $('#existingImages').html(html);
                $('#imageUrls').val(uploadedImages.join(','));
            }

            // 初始化日期选择器
            $("#inspectionTime").datetimepicker({
                format: "yyyy-mm-dd hh:ii:ss",
                minView: "hour",
                autoclose: true,
                todayBtn: true
            });

            // 公司选择联动
            $("#companyId").change(function () {
                var companyName = $(this).find("option:selected").data("name");
                $("#companyName").val(companyName);
            });

            // 建筑选择
            $("#buildingId").change(function () {
                var buildingName = $(this).find("option:selected").data("name");
                $("#buildingName").val(buildingName);
            });

            // 系统名称选择
            $("#systemName").change(function () {
                var systemType = $(this).find("option:selected").data("type");
                $("#systemType").val(systemType);
            });

            // 设备状态开关
            $("#equipmentStatusSwitch").change(function () {
                if ($(this).is(":checked")) {
                    $("#equipmentStatus").val("0");
                    $("#statusText").text("正常").css("color", "green");
                } else {
                    $("#equipmentStatus").val("1");
                    $("#statusText").text("异常").css("color", "red");
                }
            });

            // 文件选择预览
            $("#simpleUpload").change(function() {
                var files = this.files;
                $('#preview').html('');
                if (files.length > 0) {
                    $('#preview').append('<div><strong>新选择的图片：</strong></div>');
                    for (var i = 0; i < files.length; i++) {
                        $('#preview').append('<span style="margin-right:10px;">' + files[i].name + '</span>');
                    }
                }
            });
        });

        function removeImage(index) {
            console.log('Removing image at index:', index);
            uploadedImages.splice(index, 1);
            $('#imageUrls').val(uploadedImages.join(','));
            console.log('Updated imageUrls:', $('#imageUrls').val());
            
            // 重新显示
            var html = '<div><strong>已上传的图片：</strong></div>';
            for (var i = 0; i < uploadedImages.length; i++) {
                html += '<div style="display:inline-block;margin:5px;padding:5px;border:1px solid #ddd;border-radius:3px;">';
                html += '<span>图片' + (i+1) + '</span> ';
                html += '<button type="button" class="btn btn-xs btn-danger" onclick="removeImage(' + i + ')">删除</button>';
                html += '</div>';
            }
            $('#existingImages').html(html);
        }

        function submitHandler() {
            if ($.validate.form()) {
                console.log('=== Edit Simple Submit Handler ===');
                console.log('Current uploadedImages:', uploadedImages);
                
                var fileInput = document.getElementById('simpleUpload');
                var files = fileInput.files;
                
                console.log('Files:', files);
                console.log('Files length:', files.length);
                
                if (files && files.length > 0) {
                    // 有新文件，先上传
                    console.log('Uploading new files...');
                    var formData = new FormData();
                    for (var i = 0; i < files.length; i++) {
                        formData.append('files', files[i]);
                        console.log('Adding file:', files[i].name);
                    }
                    
                    $.ajax({
                        url: ctx + 'common/uploads',
                        type: 'POST',
                        data: formData,
                        processData: false,
                        contentType: false,
                        success: function(response) {
                            console.log('Upload response:', response);
                            if (response.code == 200 || response.code == 0) {
                                // 合并新旧图片URL
                                var newUrls = response.urls.split(',');
                                uploadedImages = uploadedImages.concat(newUrls);
                                $('#imageUrls').val(uploadedImages.join(','));
                                console.log('Merged imageUrls:', $('#imageUrls').val());
                                doSubmit();
                            } else {
                                $.modal.msgError('图片上传失败：' + response.msg);
                            }
                        },
                        error: function(xhr, status, error) {
                            console.error('Upload error:', error);
                            $.modal.msgError('图片上传失败：' + error);
                        }
                    });
                } else {
                    // 没有新文件，直接提交（保留已有图片）
                    console.log('No new files, submitting with existing images');
                    $('#imageUrls').val(uploadedImages.join(','));
                    doSubmit();
                }
            }
        }

        function doSubmit() {
            console.log('Submitting with imageUrls:', $("#imageUrls").val());
            $.operate.save(prefix + "/edit", $('#form-inspection-edit').serialize());
        }
    </script>
</body>
</html>
