<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:include="include :: header('修改系统类型')" />
</head>

<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-systemType-edit" th:object="${systemType}">
            <input type="hidden" name="typeId" th:field="*{typeId}" />
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">类型编码：</label>
                <div class="col-sm-8">
                    <input type="text" name="typeCode" th:field="*{typeCode}" class="form-control" maxlength="20"
                        placeholder="请输入类型编码" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">类型名称：</label>
                <div class="col-sm-8">
                    <input type="text" name="typeName" th:field="*{typeName}" class="form-control" maxlength="100"
                        placeholder="请输入类型名称" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">上级类型：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="parentId" th:field="*{parentId}">
                        <option value="0">无（顶级类型）</option>
                        <option th:each="item : ${systemTypes}" th:value="${item.typeId}" th:text="${item.typeName}"
                            th:if="${item.typeId != systemType.typeId}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">显示顺序：</label>
                <div class="col-sm-8">
                    <input type="number" name="orderNum" th:field="*{orderNum}" class="form-control" min="0">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" name="status" value="0" id="status_0"
                            th:checked="${systemType.status == '0'}">
                        <label for="status_0">正常</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" name="status" value="1" id="status_1"
                            th:checked="${systemType.status == '1'}">
                        <label for="status_1">停用</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" th:field="*{remark}" class="form-control" rows="3" maxlength="500"
                        placeholder="请输入备注"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/systemType";

        $("#form-systemType-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-systemType-edit').serialize());
            }
        }
    </script>
</body>

</html>
