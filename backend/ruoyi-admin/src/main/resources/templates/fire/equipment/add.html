<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:include="include :: header('新增消防设备')" />
    <th:block th:include="include :: datetimepicker-css" />
    <style>
        .image-preview {
            width: 80px;
            height: 80px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-color: #f9f9f9;
        }

        .image-preview:hover {
            border-color: #1890ff;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 6px;
        }
    </style>
</head>

<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-equipment-add">
            <!-- 所属客户 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">所属客户：</label>
                <div class="col-sm-8">
                    <select name="companyId" id="companyId" class="form-control m-b">
                        <option value="">请选择</option>
                    </select>
                </div>
            </div>
            <!-- 1. 所在建筑 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">所在建筑：</label>
                <div class="col-sm-8">
                    <select name="buildingId" id="buildingId" class="form-control m-b" disabled>
                        <option value="">请先选择所属客户</option>
                    </select>
                </div>
            </div>
            <!-- 2. 所在楼层 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">所在楼层：</label>
                <div class="col-sm-8">
                    <input name="floorNo" class="form-control" type="text" placeholder="请输入所在楼层">
                </div>
            </div>
            <!-- 3. 系统名称 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">系统名称：</label>
                <div class="col-sm-8">
                    <input name="systemName" id="systemName" list="systemNameList" class="form-control"
                        placeholder="可选择或直接输入">
                    <datalist id="systemNameList">
                        <option th:each="name : ${systemNames}" th:value="${name}"></option>
                    </datalist>
                </div>
            </div>
            <!-- 4. 项目类别 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">项目类别：</label>
                <div class="col-sm-8">
                    <select name="projectCategory" id="projectCategory" class="form-control m-b">
                        <option value="">请选择</option>
                    </select>
                </div>
            </div>
            <!-- 5. 设备名称 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">设备名称：</label>
                <div class="col-sm-8">
                    <input name="equipmentName" class="form-control" type="text" placeholder="请选择或输入">
                </div>
            </div>

            <!-- 6. 生产厂家 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">生产厂家：</label>
                <div class="col-sm-8">
                    <input name="manufacturer" class="form-control" type="text" placeholder="请输入并选择生产厂家">
                </div>
            </div>
            <!-- 7. 有效日期 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">有效日期：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="expireDate" class="form-control" placeholder="请选择有效期" type="text">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <!-- 8. 设备数量 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">设备数量：</label>
                <div class="col-sm-8">
                    <div class="input-group">
                        <span class="input-group-btn">
                            <button type="button" class="btn btn-default" onclick="decreaseQuantity()">－</button>
                        </span>
                        <input name="quantity" id="quantity" class="form-control text-center" type="number" value="1"
                            min="1">
                        <span class="input-group-btn">
                            <button type="button" class="btn btn-default" onclick="increaseQuantity()">＋</button>
                        </span>
                    </div>
                </div>
            </div>
            <!-- 9. 具体位置 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">具体位置：</label>
                <div class="col-sm-8">
                    <input name="location" class="form-control" type="text" placeholder="请输入具体位置">
                </div>
            </div>
            <!-- 10. 规格型号 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">规格型号：</label>
                <div class="col-sm-8">
                    <input name="model" class="form-control" type="text" placeholder="选填">
                </div>
            </div>
            <!-- 11. 设备图片 -->
            <div class="form-group">
                <label class="col-sm-3 control-label">设备图片：</label>
                <div class="col-sm-8">
                    <input type="hidden" name="image" id="image">
                    <div class="file-upload-box">
                        <div id="imagePreview" class="image-preview" onclick="selectImage()">
                            <i class="fa fa-camera fa-2x"></i>
                        </div>
                        <input type="file" id="imageUpload" accept="image/*" style="display:none"
                            onchange="uploadImage(this)">
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: datetimepicker-js" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/equipment";

        // 从URL获取公司参数
        var urlParams = new URLSearchParams(window.location.search);
        var filterCompanyId = urlParams.get('companyId');
        var buildingListRequest = null;
        var buildingListToken = 0;

        $(function () {
            $("#form-equipment-add").validate({
                focusCleanup: true
            });

            $(".input-group.date").datetimepicker({
                format: "yyyy-mm-dd",
                minView: "month",
                autoclose: true
            });

            $('#companyId').on('change', function () {
                loadBuildingList($(this).val());
            });

            // 先加载客户，预选后再加载建筑，避免并行串状态
            loadCompanyList();
            loadProjectCategories();
        });

        function resetBuildingSelect(message, disabled) {
            $('#buildingId').prop('disabled', !!disabled)
                .html('<option value="">' + message + '</option>')
                .val('');
        }

        // 加载客户列表
        function loadCompanyList() {
            $.ajax({
                url: ctx + 'fire/company/all',
                type: 'GET',
                success: function (res) {
                    if (res.code == 0 && res.data) {
                        var html = '<option value="">请选择</option>';
                        res.data.forEach(function (company) {
                            html += '<option value="' + company.companyId + '">' + company.companyName + '</option>';
                        });
                        $('#companyId').html(html);
                        if (filterCompanyId) {
                            $('#companyId').val(filterCompanyId);
                            loadBuildingList(filterCompanyId);
                        } else {
                            resetBuildingSelect('请先选择所属客户', true);
                        }
                    }
                }
            });
        }

        // 按当前客户加载建筑列表
        function loadBuildingList(companyId) {
            if (buildingListRequest && buildingListRequest.readyState !== 4) {
                buildingListRequest.abort();
            }

            if (!companyId) {
                resetBuildingSelect('请先选择所属客户', true);
                return;
            }

            resetBuildingSelect('建筑加载中……', true);
            var requestToken = ++buildingListToken;
            buildingListRequest = $.ajax({
                url: ctx + 'fire/building/all',
                type: 'GET',
                data: { companyId: companyId },
                success: function (res) {
                    if (requestToken !== buildingListToken) {
                        return;
                    }
                    if (String($('#companyId').val()) !== String(companyId)) {
                        return;
                    }
                    if (res.code != 0) {
                        resetBuildingSelect('建筑加载失败，请重试', true);
                        $.modal.alertError(res.msg || '建筑加载失败，请重试');
                        return;
                    }
                    var list = res.data || [];
                    var matched = list.filter(function (building) {
                        return String(building.companyId) === String(companyId);
                    });
                    if (matched.length === 0) {
                        resetBuildingSelect('该客户暂无建筑', true);
                        return;
                    }
                    var html = '<option value="">请选择建筑</option>';
                    matched.forEach(function (building) {
                        html += '<option value="' + building.buildingId + '">' + building.buildingName + '</option>';
                    });
                    $('#buildingId').prop('disabled', false).html(html).val('');
                },
                error: function (xhr, status) {
                    if (status === 'abort') {
                        return;
                    }
                    if (requestToken !== buildingListToken) {
                        return;
                    }
                    if (String($('#companyId').val()) !== String(companyId)) {
                        return;
                    }
                    resetBuildingSelect('建筑加载失败，请重试', true);
                    $.modal.alertError('建筑加载失败，请重试');
                }
            });
        }

        // 数量增减
        function increaseQuantity() {
            var qty = parseInt($('#quantity').val()) || 1;
            $('#quantity').val(qty + 1);
        }
        function decreaseQuantity() {
            var qty = parseInt($('#quantity').val()) || 1;
            if (qty > 1) {
                $('#quantity').val(qty - 1);
            }
        }

        // 图片上传
        function selectImage() {
            $('#imageUpload').click();
        }
        function uploadImage(input) {
            if (input.files && input.files[0]) {
                var formData = new FormData();
                formData.append('file', input.files[0]);
                $.ajax({
                    url: ctx + 'common/upload',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function (res) {
                        if (res.code == 0) {
                            $('#image').val(res.fileName);
                            $('#imagePreview').html('<img src="' + res.url + '" style="max-width:80px;max-height:80px;">');
                        } else {
                            $.modal.alertError(res.msg);
                        }
                    }
                });
            }
        }

        // 加载项目类别列表
        function loadProjectCategories() {
            $.ajax({
                url: ctx + 'fire/systemType/all',
                type: 'GET',
                success: function (res) {
                    if (res.code == 0 && res.data) {
                        var html = '<option value="">请选择</option>';
                        res.data.forEach(function (type) {
                            html += '<option value="' + type.typeName + '">' + type.typeName + '</option>';
                        });
                        $('#projectCategory').html(html);
                    }
                }
            });
        }

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-equipment-add').serialize());
            }
        }
    </script>
</body>

</html>
