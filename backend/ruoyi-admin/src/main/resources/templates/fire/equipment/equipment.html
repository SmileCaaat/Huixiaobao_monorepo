<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">

<head>
    <th:block th:include="include :: header('消防设备列表')" />
    <style>
        .company-filter-tip {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 4px;
            padding: 8px 15px;
            margin-bottom: 10px;
            color: #1890ff;
        }

        .company-filter-tip i {
            margin-right: 5px;
        }

        .company-filter-tip a {
            margin-left: 10px;
            color: #1890ff;
        }
    </style>
</head>

<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <!-- 公司过滤提示 -->
            <div class="col-sm-12 company-filter-tip" id="companyFilterTip" style="display:none;">
                <i class="fa fa-filter"></i>
                <span>当前仅显示【<span id="filterCompanyName"></span>】的设备数据</span>
                <a href="javascript:void(0)" onclick="clearCompanyFilter()"><i class="fa fa-times"></i> 清除筛选</a>
            </div>

            <div class="col-sm-12 search-collapse">
                <form id="equipment-form">
                    <div class="select-list">
                        <ul>
                            <li>
                                所属客户：<select name="companyId" id="companyId">
                                    <option value="">所有客户</option>
                                </select>
                            </li>
                            <li>
                                所在建筑：<select name="buildingId" id="buildingId">
                                    <option value="">所有建筑</option>
                                </select>
                            </li>
                            <li>
                                项目类别：<select name="projectCategory" id="projectCategoryFilter">
                                    <option value="">所有类别</option>
                                </select>
                            </li>
                            <li>
                                设备名称：<input type="text" name="equipmentName" />
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i
                                        class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i
                                        class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="fire:equipment:add">
                    <i class="fa fa-plus"></i> 新增
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()"
                    shiro:hasPermission="fire:equipment:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()"
                    shiro:hasPermission="fire:equipment:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="fire:equipment:export">
                    <i class="fa fa-download"></i> 导出Excel
                </a>
                <a class="btn btn-info" onclick="$.table.importExcel()" shiro:hasPermission="fire:equipment:import">
                    <i class="fa fa-upload"></i> 导入
                </a>
                <a class="btn btn-default" onclick="$.table.importTemplate()" shiro:hasPermission="fire:equipment:view">
                    <i class="fa fa-download"></i> 下载模板
                </a>
                <a class="btn btn-info" onclick="batchExportQrCode()" shiro:hasPermission="fire:equipment:export">
                    <i class="fa fa-qrcode"></i> 批量导出二维码
                </a>
            </div>

            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('fire:equipment:edit') }]];
        var removeFlag = [[${@permission.hasPermi('fire:equipment:remove') }]];
        var equipmentTypes = [[${@dict.getType('fire_equipment_type') }]];
        var equipmentStatus = [[${@dict.getType('fire_equipment_status') }]];
        var statusDatas = [[${@dict.getType('sys_normal_disable') }]];
        var prefix = ctx + "fire/equipment";

        // 从URL获取公司参数
        var urlParams = new URLSearchParams(window.location.search);
        var filterCompanyId = urlParams.get('companyId');
        var filterCompanyName = urlParams.get('companyName');

        $(function () {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                importUrl: prefix + "/importData",
                importTemplateUrl: prefix + "/importTemplate",
                modalName: "消防设备",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'equipmentId',
                    title: '设备ID',
                    visible: false
                },
                {
                    field: 'companyName',
                    title: '所属客户'
                },
                {
                    field: 'buildingName',
                    title: '所在建筑'
                },
                {
                    field: 'floorNo',
                    title: '所在楼层',
                    align: 'center'
                },
                {
                    field: 'systemName',
                    title: '系统名称'
                },
                {
                    field: 'projectCategory',
                    title: '项目类别'
                },
                {
                    field: 'equipmentName',
                    title: '设备名称',
                    sortable: true
                },
                {
                    field: 'manufacturer',
                    title: '生产厂家'
                },
                {
                    field: 'expireDate',
                    title: '有效日期'
                },
                {
                    field: 'quantity',
                    title: '设备数量',
                    align: 'center'
                },
                {
                    field: 'location',
                    title: '具体位置'
                },
                {
                    field: 'model',
                    title: '规格型号'
                },
                {
                    field: 'image',
                    title: '设备图片',
                    formatter: function (value, row, index) {
                        if (value) {
                            return '<img src="' + value + '" style="max-width:50px;max-height:50px;">';
                        }
                        return '-';
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function (value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="showQrCode(\'' + row.equipmentId + '\')"><i class="fa fa-qrcode"></i>二维码</a> ');
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.equipmentId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.equipmentId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);

            // 加载客户列表
            loadCompanyList();
            // 加载建筑列表
            loadBuildingList();

            // 如果有URL参数，自动设置并显示提示
            if (filterCompanyId) {
                $('#companyId').val(filterCompanyId);
                $('#companyFilterTip').show();
                $('#filterCompanyName').text(decodeURIComponent(filterCompanyName || ''));
            }

            // 选择客户后联动刷新建筑列表
            $('#companyId').change(function () {
                loadBuildingList();
            });
        });

        // 加载客户列表
        function loadCompanyList() {
            $.ajax({
                url: ctx + 'fire/company/all',
                type: 'GET',
                success: function (res) {
                    if (res.code == 0 && res.data) {
                        var html = '<option value="">所有客户</option>';
                        res.data.forEach(function (company) {
                            html += '<option value="' + company.companyId + '">' + company.companyName + '</option>';
                        });
                        $('#companyId').html(html);
                        // 如果URL有公司参数，恢复选中
                        if (filterCompanyId) {
                            $('#companyId').val(filterCompanyId);
                        }
                    }
                }
            });
        }

        // 加载建筑列表（按所选客户过滤）
        function loadBuildingList() {
            var selectedCompanyId = $('#companyId').val() || filterCompanyId;
            var url = ctx + 'fire/building/all';
            if (selectedCompanyId) {
                url += '?companyId=' + selectedCompanyId;
            }
            $.ajax({
                url: url,
                type: 'GET',
                success: function (res) {
                    if (res.code == 0 && res.data) {
                        var html = '<option value="">所有建筑</option>';
                        res.data.forEach(function (building) {
                            html += '<option value="' + building.buildingId + '">' + building.buildingName + '</option>';
                        });
                        $('#buildingId').html(html);
                    }
                    // 加载建筑后触发搜索（如果有公司参数）
                    if (filterCompanyId) {
                        $.table.search();
                    }
                }
            });
        }

        // 查看设备二维码
        function showQrCode(equipmentId) {
            var url = prefix + "/qrcode/" + equipmentId;
            $.modal.open("设备二维码", url, 320, 380);
        }

        // 批量导出二维码
        function batchExportQrCode() {
            var params = $.table.queryParams({});
            var url = prefix + "/qrcode/batchExport?" + $.param(params);
            $.modal.confirm("确认要批量导出当前筛选条件下的所有设备二维码吗？", function () {
                window.location.href = url;
            });
        }

        // 清除公司筛选
        function clearCompanyFilter() {
            filterCompanyId = null;
            filterCompanyName = null;
            $('#companyId').val('');
            $('#companyFilterTip').hide();
            var newUrl = window.location.pathname;
            window.history.replaceState({}, '', newUrl);
            // 重新加载建筑列表（不带公司过滤）
            loadBuildingList();
            $.table.search();
        }

        // 加载项目类别列表
        function loadProjectCategories() {
            $.ajax({
                url: ctx + 'fire/systemType/all',
                type: 'GET',
                success: function (res) {
                    if (res.code == 0 && res.data) {
                        var html = '<option value="">所有类别</option>';
                        res.data.forEach(function (type) {
                            html += '<option value="' + type.typeName + '">' + type.typeName + '</option>';
                        });
                        $('#projectCategoryFilter').html(html);
                    }
                }
            });
        }
        // 页面加载时初始化
        loadProjectCategories();

    </script>
</body>
<!-- 导入区域 -->
<script id="importTpl" type="text/template">
<form enctype="multipart/form-data" class="mt20 mb10">
	<div class="col-xs-offset-1">
		<input type="file" id="file" name="file"/>
		<div class="mt10 pt5">
			<input type="checkbox" id="updateSupport" name="updateSupport" title="如果设备编码已经存在，更新这条数据。"> 是否更新已经存在的设备数据
			 &nbsp;	<a onclick="$.table.importTemplate()" class="btn btn-default btn-xs"><i class="fa fa-file-excel-o"></i> 下载模板</a>
		</div>
		<font color="red" class="pull-left mt10">
			提示：仅允许导入“xls”或“xlsx”格式文件！
		</font>
	</div>
</form>
</script>

</html>
