<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:include="include :: header('签到详情')" />
    <style>
        body {
            padding: 15px;
            background: #f5f5f5;
        }

        .task-info-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .task-info-card h4 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }

        .task-info-card .info-row {
            display: flex;
            gap: 20px;
            font-size: 13px;
            opacity: 0.95;
        }

        .task-info-card .info-row span {
            display: inline-flex;
            align-items: center;
        }

        .task-info-card .info-row i {
            margin-right: 5px;
        }

        .checkin-table-container {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .table-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .table-title i {
            color: #667eea;
            margin-right: 8px;
        }

        /* 表格样式优化 */
        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: #f8f9fa;
            color: #495057;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
        }

        .table tbody tr:hover {
            background: #f8f9fa;
        }

        .badge-checkin {
            background: #007bff;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
        }

        .badge-checkout {
            background: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
        }

        .btn-detail {
            padding: 2px 10px;
            font-size: 12px;
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .no-data i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <!-- 任务信息卡片 -->
    <div class="task-info-card">
        <h4><i class="fa fa-tasks"></i> <span th:text="${task.taskName}">任务名称</span></h4>
        <div class="info-row">
            <span><i class="fa fa-building"></i> <span th:text="${task.companyName}">公司名称</span></span>
            <span th:if="${task.periodYear != null}">
                <i class="fa fa-calendar"></i> 
                <span th:text="${task.periodYear + '年'}">年份</span>
            </span>
            <span th:if="${task.managerName != null}">
                <i class="fa fa-user"></i> 
                负责人：<span th:text="${task.managerName}">负责人</span>
            </span>
        </div>
    </div>

    <!-- 签到列表 -->
    <div class="checkin-table-container">
        <div class="table-title">
            <i class="fa fa-map-marker"></i> 签到记录列表
        </div>
        <table id="checkInTable" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th width="120">签到日期</th>
                    <th width="100">签到人</th>
                    <th width="120">签到时间</th>
                    <th width="80">类型</th>
                    <th>签到地址</th>
                    <th width="100">操作</th>
                </tr>
            </thead>
            <tbody id="checkInTableBody">
                <!-- 数据通过AJAX加载 -->
            </tbody>
        </table>
    </div>

    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var taskId = [[${task.taskId}]];
        var ctx = [[${#httpServletRequest.getContextPath()}]];

        $(function () {
            loadCheckInList();
        });

        // 加载签到列表
        function loadCheckInList() {
            $.ajax({
                url: ctx + '/fire/checkIn/list',
                type: 'POST',
                data: {
                    taskId: taskId
                },
                success: function (result) {
                    if (result.code == 0 && result.rows && result.rows.length > 0) {
                        renderCheckInTable(result.rows);
                    } else {
                        showNoData();
                    }
                },
                error: function () {
                    showNoData();
                }
            });
        }

        // 渲染签到表格
        function renderCheckInTable(data) {
            var html = '';
            data.forEach(function (item) {
                var checkInDate = formatDate(item.checkInTime, 'yyyy-MM-dd');
                var checkInTimeStr = formatDate(item.checkInTime, 'HH:mm:ss');
                var typeBadge = item.checkInType == '0' 
                    ? '<span class="badge-checkin">签到</span>' 
                    : '<span class="badge-checkout">签退</span>';
                var address = item.address || '未记录';

                html += '<tr>';
                html += '<td>' + checkInDate + '</td>';
                html += '<td>' + (item.userName || '未知') + '</td>';
                html += '<td>' + checkInTimeStr + '</td>';
                html += '<td>' + typeBadge + '</td>';
                html += '<td>' + address + '</td>';
                html += '<td>';
                html += '<button class="btn btn-info btn-xs btn-detail" onclick="viewDetail(' + item.checkInId + ')">';
                html += '<i class="fa fa-eye"></i> 查看详情';
                html += '</button>';
                html += '</td>';
                html += '</tr>';
            });
            $('#checkInTableBody').html(html);
        }

        // 显示无数据提示
        function showNoData() {
            var html = '<tr><td colspan="6" class="no-data">';
            html += '<div><i class="fa fa-inbox"></i></div>';
            html += '<div>暂无签到记录</div>';
            html += '</td></tr>';
            $('#checkInTableBody').html(html);
        }

        // 查看签到详情
        function viewDetail(checkInId) {
            var url = ctx + '/fire/checkIn/detail/' + checkInId;
            // 在父窗口打开新的layer弹框
            parent.layer.open({
                type: 2,
                title: '签到详情',
                area: ['1000px', '700px'],
                fix: false,
                maxmin: true,
                shade: 0.3,
                content: url,
                btn: [],
                shadeClose: true
            });
        }

        // 日期格式化函数
        function formatDate(dateStr, format) {
            if (!dateStr) return '';
            var date = new Date(dateStr);
            var o = {
                'M+': date.getMonth() + 1,
                'd+': date.getDate(),
                'H+': date.getHours(),
                'm+': date.getMinutes(),
                's+': date.getSeconds(),
                'q+': Math.floor((date.getMonth() + 3) / 3),
                'S': date.getMilliseconds()
            };
            if (/(y+)/.test(format)) {
                format = format.replace(RegExp.$1, (date.getFullYear() + '').substr(4 - RegExp.$1.length));
            }
            for (var k in o) {
                if (new RegExp('(' + k + ')').test(format)) {
                    format = format.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (('00' + o[k]).substr(('' + o[k]).length)));
                }
            }
            return format;
        }
    </script>
</body>

</html>
