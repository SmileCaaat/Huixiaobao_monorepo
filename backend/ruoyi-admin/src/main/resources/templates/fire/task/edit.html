<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:include="include :: header('修改维保任务')" />
    <th:block th:include="include :: select2-css" />
    <style>
        .selection-summary { display: inline-flex; flex-wrap: wrap; gap: 5px; margin-left: 10px; vertical-align: middle; }
        .selection-summary .label { font-size: 12px; }
        .template-tree { max-height: 430px; overflow-y: auto; padding: 12px 18px; }
        .template-node { margin: 5px 0; line-height: 24px; }
        .state-original { color: #17823b; }
        .state-added { color: #1677c8; }
        .state-removed { color: #c9302c; text-decoration: line-through; }
        .state-badge { margin-left: 6px; font-size: 11px; text-decoration: none; display: inline-block; }
    </style>
</head>

<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-task-edit" th:object="${task}">
            <input name="taskId" th:field="*{taskId}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label">所属客户：</label>
                <div class="col-sm-8">
                    <input name="companyName" th:field="*{companyName}" class="form-control" type="text" readonly>
                    <input name="companyId" th:field="*{companyId}" type="hidden">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">任务名称：</label>
                <div class="col-sm-8">
                    <input name="taskName" th:field="*{taskName}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">任务类型：</label>
                <div class="col-sm-8">
                    <select name="taskType" class="form-control noselect2"
                        th:with="type=${@dict.getType('fire_task_type')}" required>
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"
                            th:selected="${task.taskType == dict.dictValue}">
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">关联建筑：</label>
                <div class="col-sm-8">
                    <select name="buildingId" id="buildingId" class="form-control noselect2"
                        onchange="setBuildingName(this)">
                        <option value="">请选择建筑</option>
                        <option th:each="building : ${buildings}" th:text="${building.buildingName}"
                            th:value="${building.buildingId}" th:selected="${task.buildingId == building.buildingId}">
                        </option>
                    </select>
                    <input type="hidden" name="buildingName" id="buildingName" th:value="${task.buildingName}" />
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">维保系统：</label>
                <div class="col-sm-8">
                    <button type="button" class="btn btn-info btn-sm" onclick="selectSystems()">
                        <i class="fa fa-check-square-o"></i> 选择需要的系统
                    </button>
                    <span id="selectedSystemsText" class="selection-summary">加载中...</span>
                    <input type="hidden" name="selectedSystemIds" id="selectedSystemIds"
                        th:value="${task.selectedSystemIds}" />
                    <p class="help-block" style="margin-top: 5px; color: #f39c12;">
                        <i class="fa fa-warning"></i> 修改系统选择后，将按差异同步检查记录：新增范围会生成检查项并计入完成度；已填写结果的历史记录不会删除
                    </p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">消防设施测试：</label>
                <div class="col-sm-8">
                    <button type="button" class="btn btn-warning btn-sm" onclick="selectFireTests()">
                        <i class="fa fa-check-square-o"></i> 选择消防设施测试项
                    </button>
                    <span id="selectedFireTestsText" class="selection-summary">加载中...</span>
                    <input type="hidden" name="selectedFireTestIds" id="selectedFireTestIds"
                        th:value="${task.selectedFireTestIds}" />
                    <span class="help-block m-b-none">
                        <i class="fa fa-info-circle"></i> 可选择需要的消防设施测试系统
                    </span>
                    <p class="help-block" style="margin-top: 5px; color: #f39c12;">
                        <i class="fa fa-warning"></i> 修改测试项选择后，将按差异同步检查记录并更新完成度；已填写结果的历史记录不会删除
                    </p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">周期类型：</label>
                <div class="col-sm-8">
                    <select name="periodType" class="form-control noselect2"
                        th:with="type=${@dict.getType('fire_period_type')}">
                        <option value="">请选择周期类型</option>
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"
                            th:selected="${task.periodType == dict.dictValue}">
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">周期年份：</label>
                <div class="col-sm-4">
                    <input name="periodYear" class="form-control" type="number" placeholder="如2025"
                        th:value="${task.periodYear}">
                </div>
                <label class="col-sm-2 control-label">周期序号：</label>
                <div class="col-sm-2">
                    <input name="periodNum" class="form-control" type="number" placeholder="如第几季度"
                        th:value="${task.periodNum}">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">计划开始时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="planStartTime" class="form-control" placeholder="yyyy-MM-dd" type="text"
                            th:value="${#dates.format(task.planStartTime, 'yyyy-MM-dd')}">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">计划结束时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="planEndTime" class="form-control" placeholder="yyyy-MM-dd" type="text"
                            th:value="${#dates.format(task.planEndTime, 'yyyy-MM-dd')}">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">任务状态：</label>
                <div class="col-sm-8">
                    <select name="taskStatus" class="form-control noselect2"
                        th:with="type=${@dict.getType('fire_task_status')}">
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"
                            th:selected="${dict.dictValue == task.taskStatus}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">项目负责人：</label>
                <div class="col-sm-8">
                    <select name="managerId" id="managerId" class="form-control select2" required
                        onchange="setManagerName(this)">
                        <option value="">请选择负责人</option>
                        <option th:each="user : ${users}" th:text="${user.userName}" th:value="${user.userId}"
                            th:data-phone="${user.phonenumber}" th:selected="${task.managerId == user.userId}"></option>
                    </select>
                    <input type="hidden" name="managerName" id="managerName" th:value="${task.managerName}" />
                    <input type="hidden" name="managerPhone" id="managerPhone" th:value="${task.managerPhone}" />
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">维保操作员：</label>
                <div class="col-sm-8">
                    <select name="operatorIds" id="operatorIds" class="form-control select2" multiple
                        onchange="setOperatorNames()">
                        <option th:each="user : ${users}" th:text="${user.userName}" th:value="${user.userId}"></option>
                    </select>
                    <input type="hidden" name="operatorNames" id="operatorNames" th:value="*{operatorNames}" />
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" class="form-control" rows="3">[[*{remark}]]</textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: datetimepicker-js" />
    <th:block th:include="include :: select2-js" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/task";
        // 用 operatorIds（逗号分隔的用户ID）来回显选中状态，避免同名用户时选错人
        var currentOperatorIds = /*[[${task.operatorIds}]]*/ '';

        $(function () {
            $(".select2").select2({
                width: '100%',
                placeholder: "请选择"
            });

            // 按用户 ID 匹配回显操作员选中状态
            if (currentOperatorIds) {
                var ids = currentOperatorIds.toString().split(',').map(function(id) { return id.trim(); });
                $('#operatorIds option').each(function () {
                    if (ids.indexOf($(this).val()) >= 0) {
                        $(this).prop('selected', true);
                    }
                });
                $('#operatorIds').trigger('change');
                // 同步更新 operatorNames 隐藏字段
                setOperatorNames();
            }
        });

        $("#form-task-edit").validate({
            focusCleanup: true
        });

        $("input[name='planStartTime']").datetimepicker({
            format: "yyyy-mm-dd",
            minView: "month",
            autoclose: true
        });

        $("input[name='planEndTime']").datetimepicker({
            format: "yyyy-mm-dd",
            minView: "month",
            autoclose: true
        });

        function setBuildingName(select) {
            var text = $(select).find("option:selected").text();
            $('#buildingName').val(text == '请选择建筑' ? '' : text);
        }

        function setManagerName(select) {
            var text = $(select).find("option:selected").text();
            var phone = $(select).find("option:selected").data('phone');
            $('#managerName').val(text == '请选择负责人' ? '' : text);
            $('#managerPhone').val(phone || '');
        }

        function setOperatorNames() {
            var names = [];
            $('#operatorIds option:selected').each(function () {
                names.push($(this).text());
            });
            $('#operatorNames').val(names.join(','));
        }

        function submitHandler() {
            if ($('#form-task-edit').data('submitting')) {
                return;
            }
            if (!$.validate.form()) {
                return;
            }
            // 提交前显式同步选择与展示字段
            $('#selectedSystemIds').val(currentSystemIds.join(','));
            $('#selectedFireTestIds').val(currentTestIds.join(','));
            setBuildingName(document.getElementById('buildingId'));
            setManagerName(document.getElementById('managerId'));
            setOperatorNames();

            // select[multiple] 序列化时会生成多个同名参数（operatorIds=1&operatorIds=2），
            // 后端 String 类型只能接收单个值，需手动合并成逗号分隔字符串
            var formData = $('#form-task-edit').serializeArray();
            var operatorIdList = [];
            var filteredData = [];
            $.each(formData, function(i, field) {
                if (field.name === 'operatorIds') {
                    operatorIdList.push(field.value);
                } else {
                    filteredData.push(field);
                }
            });
            filteredData.push({ name: 'operatorIds', value: operatorIdList.join(',') });
            var params = $.param(filteredData);

            // 使用项目公共封装，自动携带 X-CSRF-Token，并禁用弹窗确定按钮防重复提交
            $('#form-task-edit').data('submitting', true);
            $.operate.save(prefix + "/edit", params, function (result) {
                if (result.code != web_status.SUCCESS) {
                    $('#form-task-edit').data('submitting', false);
                }
            });
        }

        // 两个模块分别维护“数据库原值”和“本次编辑值”，所有标签与提交参数都由集合差异计算。
        var allSystemTemplates = [];
        var originalSystemIds = [];
        var currentSystemIds = [];
        var initialSelectedSystemIds = /*[[${task.selectedSystemIds}]]*/ '';
        var allTestTemplates = [];
        var originalTestIds = [];
        var currentTestIds = [];
        var initialSelectedFireTestIds = /*[[${task.selectedFireTestIds}]]*/ '';

        $(function () {
            originalSystemIds = parseIds(initialSelectedSystemIds);
            currentSystemIds = originalSystemIds.slice();
            originalTestIds = parseIds(initialSelectedFireTestIds);
            currentTestIds = originalTestIds.slice();
            $('#selectedSystemIds').val(currentSystemIds.join(','));
            $('#selectedFireTestIds').val(currentTestIds.join(','));
            loadTemplateTree('0');
            loadTemplateTree('1');
        });

        function parseIds(value) {
            if (value === null || value === undefined || String(value).trim() === '') {
                return [];
            }
            var seen = {};
            return String(value).split(',').map(function (id) {
                return parseInt(String(id).trim(), 10);
            }).filter(function (id) {
                if (isNaN(id) || seen[id]) {
                    return false;
                }
                seen[id] = true;
                return true;
            });
        }

        function loadTemplateTree(templateType) {
            $.ajax({
                url: prefix + '/templates/tree',
                type: 'GET',
                data: { templateType: templateType },
                success: function (res) {
                    if (res.code == 0 && res.data) {
                        if (templateType === '0') {
                            allSystemTemplates = res.data;
                            updateSelectionSummary('system');
                        } else {
                            allTestTemplates = res.data;
                            updateSelectionSummary('test');
                        }
                    } else {
                        $.modal.alertError(res.msg || '类目加载失败');
                    }
                },
                error: function () {
                    $.modal.alertError('类目加载失败，请刷新后重试');
                }
            });
        }

        function difference(left, right) {
            return left.filter(function (id) { return right.indexOf(id) < 0; });
        }

        function getPickerState(key) {
            if (key === 'system') {
                return {
                    original: originalSystemIds,
                    current: currentSystemIds,
                    templates: allSystemTemplates,
                    textSelector: '#selectedSystemsText',
                    hiddenSelector: '#selectedSystemIds',
                    title: '选择维保系统'
                };
            } else {
                return {
                    original: originalTestIds,
                    current: currentTestIds,
                    templates: allTestTemplates,
                    textSelector: '#selectedFireTestsText',
                    hiddenSelector: '#selectedFireTestIds',
                    title: '选择消防设施测试'
                };
            }
        }

        function updateSelectionSummary(key) {
            var state = getPickerState(key);
            var added = difference(state.current, state.original);
            var removed = difference(state.original, state.current);
            var html = '<span class="label label-success">原有 ' + state.original.length + ' 项</span>'
                + '<span class="label label-primary">本次新增 ' + added.length + ' 项</span>'
                + '<span class="label label-danger">本次取消 ' + removed.length + ' 项</span>'
                + '<span class="label label-default">保存后 ' + state.current.length + ' 项</span>';
            $(state.textSelector).html(html);
        }

        function selectSystems() {
            openTemplatePicker('system');
        }

        function selectFireTests() {
            openTemplatePicker('test');
        }

        function escapeHtml(value) {
            return $('<div>').text(value == null ? '' : String(value)).html();
        }

        function stateMeta(topId, original, current) {
            var was = original.indexOf(topId) >= 0;
            var now = current.indexOf(topId) >= 0;
            if (was && now) {
                return { css: 'state-original', badge: '<span class="label label-success state-badge">原有已选</span>' };
            }
            if (!was && now) {
                return { css: 'state-added', badge: '<span class="label label-primary state-badge">本次新增</span>' };
            }
            if (was && !now) {
                return { css: 'state-removed', badge: '<span class="label label-danger state-badge">本次取消</span>' };
            }
            return { css: '', badge: '' };
        }

        function openTemplatePicker(key) {
            var state = getPickerState(key);
            if (!state.templates.length) {
                $.modal.alertWarning('类目尚未加载完成，请稍后重试');
                return;
            }
            // 接口仍返回完整模板树，前端只渲染一级类目
            var roots = state.templates.filter(function (item) {
                return Number(item.level) === 1;
            }).map(function (item) {
                return $.extend({}, item, { id: Number(item.id), parentId: Number(item.parentId) });
            });
            var allChecked = roots.length > 0 && roots.every(function (root) {
                return state.current.indexOf(root.id) >= 0;
            });
            var anyChecked = roots.some(function (root) {
                return state.current.indexOf(root.id) >= 0;
            });
            var html = '<div class="template-tree">'
                + '<label><input type="checkbox" id="pickerSelectAll" '
                + (allChecked ? 'checked ' : '')
                + 'onchange="togglePickerAll(this.checked)"> 全选</label><hr>';
            roots.forEach(function (root) {
                var meta = stateMeta(root.id, state.original, state.current);
                var checked = state.current.indexOf(root.id) >= 0 ? ' checked' : '';
                html += '<div class="template-node ' + meta.css + '">'
                    + '<label><input type="checkbox" class="picker-root" value="' + root.id + '"' + checked + '> '
                    + escapeHtml(root.itemName) + meta.badge + '</label>'
                    + '</div>';
            });
            html += '</div>';
            layer.open({
                type: 1,
                title: state.title,
                area: ['760px', '560px'],
                content: html,
                btn: ['确定', '取消'],
                success: function () {
                    // 部分选择时设置 indeterminate（需在 DOM 插入后设置）
                    if (anyChecked && !allChecked) {
                        document.getElementById('pickerSelectAll').indeterminate = true;
                    }
                    updatePickerSelectAllState();
                },
                yes: function (index) {
                    var ids = [];
                    $('.picker-root:checked').each(function () {
                        ids.push(parseInt($(this).val(), 10));
                    });
                    ids.sort(function (a, b) { return a - b; });
                    if (key === 'system') {
                        currentSystemIds = ids;
                    } else {
                        currentTestIds = ids;
                    }
                    $(state.hiddenSelector).val(ids.join(','));
                    updateSelectionSummary(key);
                    layer.close(index);
                }
            });
        }

        function togglePickerAll(checked) {
            $('.picker-root').prop('checked', checked);
            var pickerSelectAll = document.getElementById('pickerSelectAll');
            if (pickerSelectAll) {
                pickerSelectAll.indeterminate = false;
            }
            $('.picker-root').each(function () {
                refreshPickerNodeVisual(this);
            });
        }

        function refreshPickerNodeVisual(checkbox) {
            var id = parseInt($(checkbox).val(), 10);
            var state = getPickerState($('.template-tree').closest('.layui-layer-content').length
                && allSystemTemplates.some(function (item) { return Number(item.id) === id && Number(item.level) === 1; })
                ? 'system' : 'test');
            var meta = stateMeta(id, state.original, $(checkbox).prop('checked') ? [id] : []);
            var rootNode = $(checkbox).closest('.template-node');
            rootNode.removeClass('state-original state-added state-removed').addClass(meta.css);
            rootNode.children('label').find('.state-badge').remove();
            rootNode.children('label').append(meta.badge);
        }

        function updatePickerSelectAllState() {
            var total = $('.picker-root').length;
            var checked = $('.picker-root:checked').length;
            var pickerSelectAll = document.getElementById('pickerSelectAll');
            if (!pickerSelectAll) {
                return;
            }
            pickerSelectAll.checked = total > 0 && checked === total;
            pickerSelectAll.indeterminate = checked > 0 && checked < total;
        }

        $(document).off('change.taskPicker', '.picker-root').on('change.taskPicker', '.picker-root', function () {
            refreshPickerNodeVisual(this);
            updatePickerSelectAllState();
        });
    </script>
</body>

</html>
