<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('维保简报')"/>
    <th:block th:include="include :: datetimepicker-css"/>
</head>
<body>
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-briefing">
        <input name="taskId" th:field="*{task.taskId}" type="hidden">
        
        <div class="form-group">
            <label class="col-sm-3 control-label">任务名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" th:field="*{task.taskName}" readonly>
            </div>
        </div>
        
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">维保时间：</label>
            <div class="col-sm-8">
                <div class="input-group date">
                    <input id="maintenanceTime" name="maintenanceTime" class="form-control" 
                           placeholder="yyyy-MM-dd" type="text" required
                           th:value="${task.maintenanceTime != null ? #dates.format(task.maintenanceTime, 'yyyy-MM-dd') : ''}">
                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                </div>
            </div>
        </div>
        
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">维保情况简述：</label>
            <div class="col-sm-8">
                <textarea name="maintenanceSummary" class="form-control" rows="8" 
                          placeholder="请输入本次维保情况简述" required th:text="${task.maintenanceSummary}"></textarea>
                <span class="help-block m-b-none">
                    <i class="fa fa-info-circle"></i> 
                    请简要描述本次维保的整体情况，包括检查项目、发现问题、处理结果等
                </span>
            </div>
        </div>
        
        <div class="form-group">
            <div class="col-sm-offset-3 col-sm-8">
                <button type="button" class="btn btn-sm btn-primary" onclick="submitHandler()">
                    <i class="fa fa-check"></i> 保存
                </button>
                <button type="button" class="btn btn-sm btn-default" onclick="$.modal.close()">
                    <i class="fa fa-close"></i> 关闭
                </button>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer"/>
<th:block th:include="include :: datetimepicker-js"/>
<script th:inline="javascript">
    var prefix = ctx + "fire/task";
    
    $("#form-briefing").validate({
        focusCleanup: true
    });
    
    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/saveBriefing", $('#form-briefing').serialize());
        }
    }
    
    // 初始化日期选择器
    $(function() {
        $("#maintenanceTime").datetimepicker({
            format: "yyyy-mm-dd",
            minView: "month",
            autoclose: true,
            todayBtn: true,
            language: 'zh-CN'
        });
    });
</script>
</body>
</html>
