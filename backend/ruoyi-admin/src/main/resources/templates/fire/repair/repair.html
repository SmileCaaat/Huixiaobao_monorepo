<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('故障报修列表')" />
</head>
<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>报修单号：</label>
                                <input type="text" name="repairNo" placeholder="请输入报修单号"/>
                            </li>
                            <li>
                                <label>单位名称：</label>
                                <input type="text" name="companyName" placeholder="请输入单位名称"/>
                            </li>
                            <li>
                                <label>紧急程度：</label>
                                <select name="urgencyLevel">
                                    <option value="">全部</option>
                                    <option th:each="level : ${urgencyLevels}" th:value="${level.code}" th:text="${level.info}"></option>
                                </select>
                            </li>
                            <li>
                                <label>维修状态：</label>
                                <select name="repairStatus">
                                    <option value="">全部</option>
                                    <option th:each="status : ${repairStatuses}" th:value="${status.code}" th:text="${status.info}"></option>
                                </select>
                            </li>
                            <li class="select-time">
                                <label>发现时间：</label>
                                <input type="text" class="time-input" id="startTime" placeholder="开始时间" name="params[beginFoundTime]"/>
                                <span>-</span>
                                <input type="text" class="time-input" id="endTime" placeholder="结束时间" name="params[endFoundTime]"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="fire:repair:add">
                    <i class="fa fa-plus"></i> 新增
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="fire:repair:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="fire:repair:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="fire:repair:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>

            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('fire:repair:edit')}]];
        var removeFlag = [[${@permission.hasPermi('fire:repair:remove')}]];
        var dispatchFlag = [[${@permission.hasPermi('fire:repair:accept')}]];
        var completeFlag = [[${@permission.hasPermi('fire:repair:complete')}]];
        var prefix = ctx + "fire/repair";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "故障报修",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'repairId',
                    title: '报修ID',
                    visible: false
                },
                {
                    field: 'repairNo',
                    title: '报修单号',
                    formatter: function(value, row) {
                        return '<a href="javascript:void(0)" onclick="$.operate.detail(' + row.repairId + ')">' + value + '</a>';
                    }
                },
                {
                    field: 'companyName',
                    title: '单位名称'
                },
                {
                    field: 'systemTypeName',
                    title: '系统名称'
                },
                {
                    field: 'equipmentName',
                    title: '设备名称'
                },
                {
                    field: 'urgencyLevel',
                    title: '紧急程度',
                    formatter: function(value) {
                        if (value == '0') return '<span class="badge badge-secondary">一般</span>';
                        if (value == '1') return '<span class="badge badge-warning">紧急</span>';
                        if (value == '2') return '<span class="badge badge-danger">特急</span>';
                        return value;
                    }
                },
                {
                    field: 'repairStatus',
                    title: '维修状态',
                    formatter: function(value) {
                        if (value == '0') return '<span class="badge badge-info">待处理</span>';
                        if (value == '1') return '<span class="badge badge-warning">处理中</span>';
                        if (value == '2') return '<span class="badge badge-success">已完成</span>';
                        return value;
                    }
                },
                {
                    field: 'reporterName',
                    title: '报修人'
                },
                {
                    field: 'repairPerson',
                    title: '处理人'
                },
                {
                    field: 'dispatchTime',
                    title: '派发时间'
                },
                {
                    field: 'foundTime',
                    title: '发现时间'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="$.operate.detail(' + row.repairId + ')"><i class="fa fa-eye"></i>查看</a> ');

                        if (row.repairStatus == '0') {
                            actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.repairId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                            actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.repairId + '\')"><i class="fa fa-remove"></i>删除</a> ');
                        }

                        if (row.repairStatus != '2') {
                            actions.push('<a class="btn btn-primary btn-xs ' + dispatchFlag + '" href="javascript:void(0)" onclick="dispatchRepair(' + row.repairId + ')"><i class="fa fa-share"></i>派发</a> ');
                        }

                        if (row.repairStatus == '1') {
                            actions.push('<a class="btn btn-success btn-xs ' + completeFlag + '" href="javascript:void(0)" onclick="completeRepair(' + row.repairId + ')"><i class="fa fa-check-circle"></i>完成</a>');
                        }

                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });

        $.operate.detail = function(repairId) {
            var url = prefix + '/detail/' + repairId;
            $.modal.openTab("报修详情", url);
        }

        function dispatchRepair(repairId) {
            var url = prefix + '/dispatch/' + repairId;
            $.modal.open("派发报修", url, '700', '420');
        }

        function completeRepair(repairId) {
            var url = prefix + '/complete/' + repairId;
            $.modal.open("完成维修", url, '800', '600');
        }
    </script>
</body>
</html>
