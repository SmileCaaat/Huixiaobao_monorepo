<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('派发报修')" />
    <th:block th:include="include :: select2-css" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-repair-dispatch">
            <input name="repairId" id="repairId" th:value="${repair.repairId}" type="hidden">
            <input type="hidden" id="companyId" th:value="${repair.companyId}">
            <div class="form-group">
                <label class="col-sm-4 control-label">报修单号：</label>
                <div class="col-sm-7">
                    <p class="form-control-static" th:text="${repair.repairNo}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label">单位名称：</label>
                <div class="col-sm-7">
                    <p class="form-control-static" th:text="${repair.companyName}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label">报修人：</label>
                <div class="col-sm-7">
                    <p class="form-control-static">
                        <span th:text="${repair.reporterName}"></span>
                        <span th:if="${repair.reporterPhone != null}" th:text="' (' + ${repair.reporterPhone} + ')'"></span>
                    </p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label">故障说明：</label>
                <div class="col-sm-7">
                    <p class="form-control-static" th:text="${repair.faultDescription}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4 control-label is-required">报修处理人：</label>
                <div class="col-sm-7">
                    <select name="repairUserId" id="repairUserId" class="form-control" required disabled>
                        <option value="">加载中...</option>
                    </select>
                    <span id="dispatchUserHint" class="help-block" style="display:none;color:#c9302c;margin-top:6px;"></span>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-offset-4 col-sm-7">
                    <div class="alert alert-info" style="margin-bottom:0;">
                        <i class="fa fa-info-circle"></i> 确认后，该故障报修任务将派发给所选报修处理人。
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: select2-js" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/repair";
        var repairId = /*[[${repair.repairId}]]*/ 0;
        var companyId = /*[[${repair.companyId}]]*/ null;
        var currentRepairUserId = /*[[${repair.repairUserId}]]*/ null;
        var usersLoaded = false;

        $(function () {
            initRepairUserSelect();
            loadDispatchUsers();
        });

        function initRepairUserSelect() {
            if ($('#repairUserId').hasClass('select2-hidden-accessible')) {
                $('#repairUserId').select2('destroy');
            }
            $('#repairUserId').select2({
                width: '100%',
                placeholder: '请选择报修处理人',
                allowClear: false,
                dropdownParent: $(document.body),
                language: {
                    noResults: function () {
                        return '暂无可派发的系统用户';
                    }
                }
            });
        }

        function setDispatchHint(message, isError) {
            var $hint = $('#dispatchUserHint');
            if (!message) {
                $hint.hide().text('');
                return;
            }
            $hint.css('color', isError ? '#c9302c' : '#8a6d3b').text(message).show();
        }

        function renderDispatchUsers(users) {
            var $select = $('#repairUserId');
            $select.empty();
            if (!users || !users.length) {
                $select.append('<option value="" selected disabled>暂无可派发的系统用户</option>');
                $select.prop('disabled', true);
                usersLoaded = false;
                setDispatchHint('暂无可派发的系统用户', true);
                initRepairUserSelect();
                return;
            }
            $select.append('<option value="">请选择报修处理人</option>');
            $.each(users, function (i, user) {
                var userId = user.userId;
                var userName = user.userName || '';
                var phone = user.phonenumber || '';
                // 显示：用户名称 + 手机号
                var label = userName;
                if (phone) {
                    label = userName ? (userName + '（' + phone + '）') : phone;
                }
                if (!label) {
                    label = '用户' + userId;
                }
                var selected = currentRepairUserId != null && String(currentRepairUserId) === String(userId);
                $select.append($('<option></option>')
                    .attr('value', userId)
                    .prop('selected', selected)
                    .text(label));
            });
            $select.prop('disabled', false);
            usersLoaded = true;
            setDispatchHint('', false);
            initRepairUserSelect();
        }

        function loadDispatchUsers() {
            usersLoaded = false;
            $('#repairUserId').prop('disabled', true).html('<option value="">加载中...</option>');
            setDispatchHint('', false);
            if (!repairId) {
                renderDispatchUsers([]);
                setDispatchHint('报修处理人加载失败，请稍后重试', true);
                return;
            }
            $.ajax({
                url: prefix + '/dispatchUsers/' + repairId,
                type: 'GET',
                dataType: 'json',
                success: function (res) {
                    if (res.code != web_status.SUCCESS) {
                        renderDispatchUsers([]);
                        setDispatchHint(res.msg || '报修处理人加载失败，请稍后重试', true);
                        $.modal.alertError(res.msg || '报修处理人加载失败，请稍后重试');
                        return;
                    }
                    var users = res.data;
                    if (!$.isArray(users)) {
                        users = [];
                    }
                    renderDispatchUsers(users);
                },
                error: function (xhr) {
                    renderDispatchUsers([]);
                    var msg = '报修处理人加载失败，请稍后重试';
                    if (xhr && (xhr.status === 401 || xhr.status === 403)) {
                        msg = '无权加载报修处理人，请确认账号权限';
                    }
                    setDispatchHint(msg, true);
                    $.modal.alertError(msg);
                }
            });
        }

        function submitHandler() {
            if ($('#form-repair-dispatch').data('submitting')) {
                return;
            }
            if (!usersLoaded || $('#repairUserId').prop('disabled')) {
                $.modal.alertWarning('暂无可派发的系统用户');
                return;
            }
            var repairUserId = $('#repairUserId').val();
            if (!repairUserId) {
                $.modal.alertWarning('请选择报修处理人');
                return;
            }
            $('#form-repair-dispatch').data('submitting', true);
            // 真实字段：repairId + repairUserId
            $.operate.save(prefix + '/dispatch', $('#form-repair-dispatch').serialize(), function (result) {
                if (result.code != web_status.SUCCESS) {
                    $('#form-repair-dispatch').data('submitting', false);
                }
            });
        }
    </script>
</body>
</html>
