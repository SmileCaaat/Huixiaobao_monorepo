<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('完成维修')" />
    <th:block th:include="include :: bootstrap-fileinput-css" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-repair-complete">
            <input name="repairId" th:value="${repair.repairId}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label">报修单号：</label>
                <div class="col-sm-8">
                    <p class="form-control-static" th:text="${repair.repairNo}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">单位名称：</label>
                <div class="col-sm-8">
                    <p class="form-control-static" th:text="${repair.companyName}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">系统名称：</label>
                <div class="col-sm-8">
                    <p class="form-control-static" th:text="${repair.systemTypeName}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">设备名称：</label>
                <div class="col-sm-8">
                    <p class="form-control-static" th:text="${repair.equipmentName}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">故障说明：</label>
                <div class="col-sm-8">
                    <p class="form-control-static" th:text="${repair.faultDescription}"></p>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">维修人员：</label>
                <div class="col-sm-8">
                    <p class="form-control-static">
                        <span th:text="${repair.repairPerson}"></span>
                        <span th:if="${repair.repairPhone != null}" th:text="' (' + ${repair.repairPhone} + ')'"></span>
                    </p>
                </div>
            </div>
            <hr>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">维修说明：</label>
                <div class="col-sm-8">
                    <textarea name="repairDescription" class="form-control" rows="5" maxlength="500" 
                              required placeholder="请详细描述维修过程和结果"></textarea>
                    <span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 请详细说明维修情况、更换的配件、解决方案等</span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">维修图片：</label>
                <div class="col-sm-8">
                    <input type="hidden" name="repairImages" id="repairImages">
                    <div class="file-loading">
                        <input id="repairImageUpload" name="file" type="file" multiple>
                    </div>
                    <span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 支持jpg、jpeg、png、gif格式，最多上传5张维修现场照片</span>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: bootstrap-fileinput-js" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/repair";
        
        $("#form-repair-complete").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/complete", $('#form-repair-complete').serialize());
            }
        }

        $(function() {
            // 初始化图片上传
            $("#repairImageUpload").fileinput({
                uploadUrl: ctx + "common/upload",
                uploadAsync: true,
                showUpload: false,
                showRemove: true,
                maxFileCount: 5,
                allowedFileExtensions: ['jpg', 'jpeg', 'png', 'gif'],
                msgFilesTooMany: "选择上传的文件数量({n}) 超过允许的最大数值{m}！",
                language: 'zh'
            }).on('fileuploaded', function(event, data, previewId, index) {
                var response = data.response;
                if (response.code == 0) {
                    var images = $("#repairImages").val();
                    if (images) {
                        $("#repairImages").val(images + "," + response.url);
                    } else {
                        $("#repairImages").val(response.url);
                    }
                } else {
                    $.modal.msgError(response.msg);
                }
            }).on('fileremoved', function(event, id, index) {
                // 从隐藏域中移除对应的图片URL
                var images = $("#repairImages").val().split(",");
                images.splice(index, 1);
                $("#repairImages").val(images.join(","));
            });
        });
    </script>
</body>
</html>
