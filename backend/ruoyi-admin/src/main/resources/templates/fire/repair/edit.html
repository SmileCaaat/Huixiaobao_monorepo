<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:include="include :: header('修改故障报修')" />
    <th:block th:include="include :: bootstrap-fileinput-css" />
</head>

<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-repair-edit">
            <input name="repairId" th:value="${repair.repairId}" type="hidden">
            <h4 class="form-header h4">报修信息</h4>
            <div class="form-group">
                <label class="col-sm-3 control-label">报修单号：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" th:value="${repair.repairNo}" readonly>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">单位名称：</label>
                <div class="col-sm-8">
                    <input type="hidden" name="companyName" id="companyName" th:value="${repair.companyName}">
                    <select name="companyId" class="form-control" required onchange="loadCompanyInfo(this.value)">
                        <option value="">请选择单位</option>
                        <option th:each="company : ${companies}" th:value="${company.companyId}"
                            th:text="${company.companyName}" th:selected="${company.companyId == repair.companyId}"
                            th:attr="data-address=${company.address},data-name=${company.companyName}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">系统名称：</label>
                <div class="col-sm-8">
                    <input type="hidden" name="systemTypeName" id="systemTypeName" th:value="${repair.systemTypeName}">
                    <select name="systemTypeId" class="form-control" required onchange="loadSystemInfo(this.value)">
                        <option value="">请选择系统</option>
                        <option th:each="type : ${systemTypes}" th:value="${type.typeId}" th:text="${type.typeName}"
                            th:selected="${type.typeId == repair.systemTypeId}" th:attr="data-name=${type.typeName}">
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">设备名称：</label>
                <div class="col-sm-8">
                    <input name="equipmentName" id="equipmentName" list="equipmentNameList" class="form-control"
                        th:value="${repair.equipmentName}" placeholder="可选择或直接输入">
                    <datalist id="equipmentNameList">
                        <option th:each="name : ${equipmentNames}" th:value="${name}"></option>
                    </datalist>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">客户地址：</label>
                <div class="col-sm-8">
                    <input id="customerAddress" name="customerAddress" class="form-control" type="text" maxlength="500"
                        th:value="${repair.customerAddress}" placeholder="请输入客户地址">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">发现时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="foundTime" class="form-control" type="text" required
                            th:value="${#dates.format(repair.foundTime, 'yyyy-MM-dd HH:mm:ss')}">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">是否上报：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" name="isReported" value="1" th:checked="${repair.isReported == '1'}">
                        <label>是</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" name="isReported" value="0" th:checked="${repair.isReported == '0'}">
                        <label>否</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">紧急程度：</label>
                <div class="col-sm-8">
                    <div class="radio-box" th:each="level : ${urgencyLevels}">
                        <input type="radio" name="urgencyLevel" th:value="${level.code}"
                            th:checked="${level.code == repair.urgencyLevel}" required>
                        <label th:text="${level.info}"></label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">故障说明：</label>
                <div class="col-sm-8">
                    <textarea name="faultDescription" class="form-control" rows="5" maxlength="500" required
                        placeholder="请详细描述故障情况" th:text="${repair.faultDescription}"></textarea>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">故障图片：</label>
                <div class="col-sm-8">
                    <input type="hidden" name="faultImages" id="faultImages" th:value="${repair.faultImages}">
                    <div class="file-loading">
                        <input id="faultImageUpload" name="file" type="file" multiple>
                    </div>
                    <span class="help-block m-b-none"><i class="fa fa-info-circle"></i>
                        支持jpg、jpeg、png、gif格式，最多上传5张</span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" class="form-control" rows="3" maxlength="500"
                        th:text="${repair.remark}"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: bootstrap-fileinput-js" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/repair";
        var existingImages = [[${ repair.faultImages }]];

        $("#form-repair-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-repair-edit').serialize());
            }
        }

        // 加载单位信息
        function loadCompanyInfo(companyId) {
            if (companyId) {
                var selectedOption = $("select[name='companyId'] option:selected");
                var address = selectedOption.attr("data-address");
                var name = selectedOption.attr("data-name");
                $("#customerAddress").val(address || "");
                $("#companyName").val(name || "");
            } else {
                $("#customerAddress").val("");
                $("#companyName").val("");
            }
        }

        // 加载系统信息
        function loadSystemInfo(systemTypeId) {
            if (systemTypeId) {
                var selectedOption = $("select[name='systemTypeId'] option:selected");
                var name = selectedOption.attr("data-name");
                $("#systemTypeName").val(name || "");
            } else {
                $("#systemTypeName").val("");
            }
        }

        // 加载设备信息
        function loadEquipmentInfo(equipmentId) {
            if (equipmentId) {
                var selectedOption = $("select[name='equipmentId'] option:selected");
                var name = selectedOption.attr("data-name");
                $("#equipmentName").val(name || "");
            } else {
                $("#equipmentName").val("");
            }
        }

        $(function () {
            // 初始化日期时间选择器
            layui.use('laydate', function () {
                var laydate = layui.laydate;
                laydate.render({
                    elem: 'input[name="foundTime"]',
                    type: 'datetime',
                    format: 'yyyy-MM-dd HH:mm:ss'
                });
            });

            // 初始化图片上传，显示已有图片
            var initialPreview = [];
            var initialPreviewConfig = [];
            if (existingImages) {
                var images = existingImages.split(",");
                for (var i = 0; i < images.length; i++) {
                    if (images[i]) {
                        // 图片路径已经是完整的，不需要再加ctx
                        initialPreview.push(images[i]);
                        initialPreviewConfig.push({
                            caption: "图片" + (i + 1),
                            url: prefix + "/removeImage",
                            key: i
                        });
                    }
                }
            }

            $("#faultImageUpload").fileinput({
                uploadUrl: ctx + "common/upload",
                uploadAsync: true,
                showUpload: true,
                showRemove: true,
                maxFileCount: 5,
                allowedFileExtensions: ['jpg', 'jpeg', 'png', 'gif'],
                msgFilesTooMany: "选择上传的文件数量({n}) 超过允许的最大数值{m}！",
                language: 'zh',
                initialPreview: initialPreview,
                initialPreviewAsData: true,
                initialPreviewConfig: initialPreviewConfig
            }).on('fileuploaded', function (event, data, previewId, index) {
                var response = data.response;
                if (response.code == 0) {
                    var images = $("#faultImages").val();
                    if (images) {
                        $("#faultImages").val(images + "," + response.url);
                    } else {
                        $("#faultImages").val(response.url);
                    }
                } else {
                    $.modal.msgError(response.msg);
                }
            }).on('fileremoved', function (event, id, index) {
                // 从隐藏域中移除对应的图片URL
                var images = $("#faultImages").val().split(",");
                images.splice(index, 1);
                $("#faultImages").val(images.join(","));
            });
        });
    </script>
</body>

</html>
