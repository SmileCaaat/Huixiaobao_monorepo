<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:include="include :: header('新增建筑信息')" />
</head>

<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-building-add">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">所属客户：</label>
                <div class="col-sm-8">
                    <select name="companyId" id="companyId" class="form-control" required>
                        <option value="">请选择公司</option>
                    </select>
                    <input type="hidden" name="companyName" id="companyName">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">建筑编码：</label>
                <div class="col-sm-8">
                    <input name="buildingCode" class="form-control" type="text" required placeholder="请输入建筑编码">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">建筑名称：</label>
                <div class="col-sm-8">
                    <input name="buildingName" class="form-control" type="text" required placeholder="请输入建筑名称">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">建筑地址：</label>
                <div class="col-sm-8">
                    <input name="address" class="form-control" type="text" placeholder="请输入建筑地址">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">建筑类别：</label>
                <div class="col-sm-8">
                    <select name="buildingType" class="form-control m-b"
                        th:with="type=${@dict.getType('fire_building_type')}">
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}">
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">自动消防设施：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" id="autoFireSystem1" name="autoFireSystem" value="1" checked>
                        <label for="autoFireSystem1">有</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" id="autoFireSystem0" name="autoFireSystem" value="0">
                        <label for="autoFireSystem0">无</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">占地面积(㎡)：</label>
                <div class="col-sm-8">
                    <input name="landArea" class="form-control" type="number" step="0.01" min="0" placeholder="请输入占地面积">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">建筑面积(㎡)：</label>
                <div class="col-sm-8">
                    <input name="area" class="form-control" type="number" step="0.01" min="0" placeholder="请输入建筑面积">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">楼层数(层)：</label>
                <div class="col-sm-8">
                    <input name="floorCount" class="form-control" type="number" min="1" value="1" placeholder="请输入楼层数">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">建筑高度(m)：</label>
                <div class="col-sm-8">
                    <input name="buildingHeight" class="form-control" type="number" step="0.01" min="0"
                        placeholder="请输入建筑高度">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">地上层层数：</label>
                <div class="col-sm-8">
                    <input name="aboveGroundFloors" class="form-control" type="number" min="0" placeholder="请输入地上层层数">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">地下层层数：</label>
                <div class="col-sm-8">
                    <input name="undergroundFloors" class="form-control" type="number" min="0" placeholder="请输入地下层层数">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">安全出口数(个)：</label>
                <div class="col-sm-8">
                    <input name="emergencyExits" class="form-control" type="number" min="0" placeholder="请输入安全出口数">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">疏散楼梯数(个)：</label>
                <div class="col-sm-8">
                    <input name="evacuationStairs" class="form-control" type="number" min="0" placeholder="请输入疏散楼梯数">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">消防电梯数(个)：</label>
                <div class="col-sm-8">
                    <input name="fireElevators" class="form-control" type="number" min="0" placeholder="请输入消防电梯数">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">避难层位置：</label>
                <div class="col-sm-8">
                    <input name="refugeFloor" class="form-control" type="text" placeholder="请输入避难层位置，如：15层、20层">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">消防等级：</label>
                <div class="col-sm-8">
                    <select name="fireLevel" class="form-control m-b" th:with="type=${@dict.getType('fire_level')}">
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}">
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">联系人：</label>
                <div class="col-sm-8">
                    <input name="contactPerson" class="form-control" type="text" placeholder="请输入联系人">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">联系电话：</label>
                <div class="col-sm-8">
                    <input name="contactPhone" class="form-control" type="text" placeholder="请输入联系电话">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box" th:each="dict : ${@dict.getType('sys_normal_disable')}">
                        <input type="radio" th:id="${dict.dictCode}" name="status" th:value="${dict.dictValue}"
                            th:checked="${dict.isDefault == 'Y' ? true : false}">
                        <label th:for="${dict.dictCode}" th:text="${dict.dictLabel}"></label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" class="form-control" rows="3" placeholder="请输入备注信息"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/building";

        // 从URL获取公司参数
        var urlParams = new URLSearchParams(window.location.search);
        var filterCompanyId = urlParams.get('companyId');
        var filterCompanyName = urlParams.get('companyName');

        $("#form-building-add").validate({
            focusCleanup: true
        });

        $(function () {
            // 加载公司下拉列表
            loadCompanyList();
        });

        // 加载公司列表
        function loadCompanyList() {
            $.ajax({
                url: ctx + 'fire/company/all',
                type: 'POST',
                success: function (res) {
                    if (res.code == 0 && res.data) {
                        var html = '<option value="">请选择公司</option>';
                        res.data.forEach(function (company) {
                            var selected = filterCompanyId && company.companyId == filterCompanyId ? ' selected' : '';
                            html += '<option value="' + company.companyId + '" data-name="' + company.companyName + '"' + selected + '>' + company.companyName + '</option>';
                        });
                        $('#companyId').html(html);

                        // 如果有URL参数，设置公司名称
                        if (filterCompanyId && filterCompanyName) {
                            $('#companyName').val(decodeURIComponent(filterCompanyName));
                        }
                    }
                }
            });
        }

        // 公司选择变化时更新隐藏字段
        $('#companyId').on('change', function () {
            var name = $(this).find('option:selected').data('name') || '';
            $('#companyName').val(name);
        });

        function submitHandler() {
            // 设置公司名称
            var name = $('#companyId').find('option:selected').data('name') || '';
            $('#companyName').val(name);

            if ($.validate.form()) {
                $.operate.save(prefix + "/add", $('#form-building-add').serialize());
            }
        }
    </script>
</body>

</html>
