<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">

<head>
    <th:block th:include="include :: header('建筑信息列表')" />
    <style>
        /* 表格单元格不换行，超长显示省略号 */
        #bootstrap-table td {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        #bootstrap-table td:last-child {
            max-width: none;
        }

        .company-filter-tip {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 4px;
            padding: 8px 15px;
            margin-bottom: 10px;
            color: #1890ff;
        }

        .company-filter-tip i {
            margin-right: 5px;
        }

        .company-filter-tip a {
            margin-left: 10px;
            color: #1890ff;
        }
    </style>
</head>

<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <!-- 公司过滤提示 -->
            <div class="col-sm-12 company-filter-tip" id="companyFilterTip" style="display:none;">
                <i class="fa fa-filter"></i>
                <span>当前仅显示【<span id="filterCompanyName"></span>】的数据</span>
                <a href="javascript:void(0)" onclick="clearCompanyFilter()"><i class="fa fa-times"></i> 清除筛选</a>
            </div>

            <div class="col-sm-12 search-collapse">
                <form id="building-form">
                    <div class="select-list">
                        <ul>
                            <li>
                                所属客户：<select name="companyId" id="companyId">
                                    <option value="">所有公司</option>
                                </select>
                            </li>
                            <li>
                                建筑编码：<input type="text" name="buildingCode" />
                            </li>
                            <li>
                                建筑名称：<input type="text" name="buildingName" />
                            </li>
                            <li>
                                建筑类别：<select name="buildingType" th:with="type=${@dict.getType('fire_building_type')}">
                                    <option value="">所有</option>
                                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}"
                                        th:value="${dict.dictValue}"></option>
                                </select>
                            </li>
                            <li>
                                消防等级：<select name="fireLevel" th:with="type=${@dict.getType('fire_level')}">
                                    <option value="">所有</option>
                                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}"
                                        th:value="${dict.dictValue}"></option>
                                </select>
                            </li>
                            <li>
                                状态：<select name="status" th:with="type=${@dict.getType('sys_normal_disable')}">
                                    <option value="">所有</option>
                                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}"
                                        th:value="${dict.dictValue}"></option>
                                </select>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i
                                        class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i
                                        class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="handleAdd()" shiro:hasPermission="fire:building:add">
                    <i class="fa fa-plus"></i> 新增
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()"
                    shiro:hasPermission="fire:building:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()"
                    shiro:hasPermission="fire:building:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="fire:building:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>

            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('fire:building:edit') }]];
        var removeFlag = [[${@permission.hasPermi('fire:building:remove') }]];
        var buildingTypes = [[${@dict.getType('fire_building_type') }]];
        var fireLevels = [[${@dict.getType('fire_level') }]];
        var statusDatas = [[${@dict.getType('sys_normal_disable') }]];
        var prefix = ctx + "fire/building";

        // 从URL获取公司参数
        var urlParams = new URLSearchParams(window.location.search);
        var filterCompanyId = urlParams.get('companyId');
        var filterCompanyName = urlParams.get('companyName');

        $(function () {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "建筑",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'buildingId',
                    title: '建筑ID',
                    visible: false
                },
                {
                    field: 'companyName',
                    title: '所属客户',
                    sortable: true
                },
                {
                    field: 'buildingCode',
                    title: '建筑编码',
                    sortable: true
                },
                {
                    field: 'buildingName',
                    title: '建筑名称',
                    sortable: true
                },
                {
                    field: 'address',
                    title: '建筑地址'
                },
                {
                    field: 'buildingType',
                    title: '建筑类别',
                    formatter: function (value, row, index) {
                        return $.table.selectDictLabel(buildingTypes, value);
                    }
                },
                {
                    field: 'autoFireSystem',
                    title: '自动消防设施',
                    align: 'center',
                    formatter: function (value, row, index) {
                        return value == '1' ? '<span class="label label-success">有</span>' : '<span class="label label-default">无</span>';
                    }
                },
                {
                    field: 'landArea',
                    title: '占地面积(㎡)',
                    align: 'center'
                },
                {
                    field: 'area',
                    title: '建筑面积(㎡)',
                    align: 'center'
                },
                {
                    field: 'floorCount',
                    title: '楼层数',
                    align: 'center'
                },
                {
                    field: 'buildingHeight',
                    title: '建筑高度(m)',
                    align: 'center'
                },
                {
                    field: 'aboveGroundFloors',
                    title: '地上层数',
                    align: 'center'
                },
                {
                    field: 'undergroundFloors',
                    title: '地下层数',
                    align: 'center'
                },
                {
                    field: 'emergencyExits',
                    title: '安全出口',
                    align: 'center'
                },
                {
                    field: 'evacuationStairs',
                    title: '疏散楼梯',
                    align: 'center'
                },
                {
                    field: 'fireElevators',
                    title: '消防电梯',
                    align: 'center'
                },
                {
                    field: 'refugeFloor',
                    title: '避难层位置'
                },
                {
                    field: 'fireLevel',
                    title: '消防等级',
                    align: 'center',
                    formatter: function (value, row, index) {
                        return $.table.selectDictLabel(fireLevels, value);
                    }
                },
                {
                    field: 'contactPerson',
                    title: '联系人'
                },
                {
                    field: 'contactPhone',
                    title: '联系电话'
                },
                {
                    field: 'status',
                    title: '状态',
                    align: 'center',
                    formatter: function (value, row, index) {
                        return $.table.selectDictLabel(statusDatas, value);
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function (value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.buildingId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.buildingId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return '<div style="white-space:nowrap;">' + actions.join('') + '</div>';
                    }
                }]
            };
            $.table.init(options);

            // 加载公司下拉列表
            loadCompanyList();

            // 如果有URL参数，自动设置并显示提示
            if (filterCompanyId) {
                $('#companyFilterTip').show();
                $('#filterCompanyName').text(decodeURIComponent(filterCompanyName || ''));
            }
        });

        // 加载公司列表
        function loadCompanyList() {
            $.ajax({
                url: ctx + 'fire/company/all',
                type: 'POST',
                success: function (res) {
                    if (res.code == 0 && res.data) {
                        var html = '<option value="">所有公司</option>';
                        res.data.forEach(function (company) {
                            var selected = filterCompanyId && company.companyId == filterCompanyId ? ' selected' : '';
                            html += '<option value="' + company.companyId + '"' + selected + '>' + company.companyName + '</option>';
                        });
                        $('#companyId').html(html);

                        // 如果有URL参数，自动搜索
                        if (filterCompanyId) {
                            $.table.search();
                        }
                    }
                }
            });
        }

        // 清除公司筛选
        function clearCompanyFilter() {
            filterCompanyId = null;
            filterCompanyName = null;
            $('#companyId').val('');
            $('#companyFilterTip').hide();
            // 修改URL，移除参数
            var newUrl = window.location.pathname;
            window.history.replaceState({}, '', newUrl);
            $.table.search();
        }

        // 新增时带上公司参数
        function handleAdd() {
            var url = prefix + "/add";
            if (filterCompanyId) {
                url += "?companyId=" + filterCompanyId + "&companyName=" + encodeURIComponent(filterCompanyName || '');
            }
            $.modal.open("新增建筑", url);
        }
    </script>
</body>

</html>
