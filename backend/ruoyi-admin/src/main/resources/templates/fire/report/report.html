<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">

<head>
    <th:block th:include="include :: header('维保报告列表')" />
</head>

<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>任务名称：</label>
                                <input type="text" name="taskName" />
                            </li>
                            <li>
                                <label>报告名称：</label>
                                <input type="text" name="reportName" />
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i
                                        class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i
                                        class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="openGenerate()" shiro:hasPermission="fire:report:generate">
                    <i class="fa fa-plus"></i> 生成报告
                </a>
                <a class="btn btn-info" onclick="openAddJob()" shiro:hasPermission="fire:report:add">
                    <i class="fa fa-clock-o"></i> 定时生成
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()"
                    shiro:hasPermission="fire:report:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="fire:report:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var removeFlag = [[${@permission.hasPermi('fire:report:remove') }]];
        var prefix = ctx + "fire/report";

        $(function () {
            var options = {
                url: prefix + "/list",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "维保报告",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'reportId',
                    title: '报告ID',
                    visible: false
                },
                {
                    field: 'taskName',
                    title: '维保任务名称'
                },
                {
                    field: 'reportName',
                    title: '报告名称'
                },
                {
                    field: 'fileSize',
                    title: '文件大小',
                    formatter: function (value, row, index) {
                        if (value == null || value == 0) return '-';
                        if (value < 1024) return value + ' B';
                        if (value < 1024 * 1024) return (value / 1024).toFixed(2) + ' KB';
                        return (value / 1024 / 1024).toFixed(2) + ' MB';
                    }
                },
                {
                    field: 'createBy',
                    title: '创建人'
                },
                {
                    field: 'createTime',
                    title: '生成时间'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function (value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-primary btn-xs" href="javascript:void(0)" onclick="downloadReport(' + row.reportId + ')"><i class="fa fa-download"></i> 下载</a> ');
                        actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="previewReport(' + row.reportId + ')"><i class="fa fa-eye"></i> 预览</a> ');
                        if (removeFlag) {
                            actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.reportId + '\')"><i class="fa fa-remove"></i> 删除</a>');
                        }
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });

        function openGenerate() {
            $.modal.open("生成维保报告", prefix + "/addJob?type=manual");
        }

        function openAddJob() {
            $.modal.open("添加定时任务", prefix + "/addJob?type=job");
        }

        function downloadReport(reportId) {
            window.location.href = prefix + "/download/" + reportId;
        }

        function previewReport(reportId) {
            window.open(prefix + "/preview/" + reportId);
        }
    </script>
</body>

</html>
