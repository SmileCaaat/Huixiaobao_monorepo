<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:include="include :: header('维保报告配置')" />
    <th:block th:include="include :: datetimepicker-css" />
</head>

<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-report-config">
            <input type="hidden" id="type" name="type" th:value="${type}" />

            <!-- 手动生成：客户 → 任务 二级联动 -->
            <div id="manual-area" style="display: none;">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">客户名称：</label>
                    <div class="col-sm-8">
                        <select id="companyId" name="companyId" class="form-control m-b" required>
                            <option value="">请选择客户</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">维保任务：</label>
                    <div class="col-sm-8">
                        <select id="manualTaskId" name="taskId" class="form-control m-b" required disabled>
                            <option value="">请先选择客户</option>
                        </select>
                        <span id="taskEmptyTip" class="help-block m-b-none text-warning" style="display:none;">该客户暂无可生成报告的维保任务</span>
                    </div>
                </div>
            </div>

            <!-- 定时任务：保留原任务下拉 -->
            <div id="job-task-area">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">维保任务：</label>
                    <div class="col-sm-8">
                        <select id="jobTaskId" name="jobTaskId" class="form-control m-b">
                            <option value="">请选择维保任务</option>
                            <option th:each="task : ${tasks}" th:value="${task.taskId}" th:text="${task.taskName}"></option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="schedule-area" style="display: none;">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">任务名称：</label>
                    <div class="col-sm-8">
                        <input name="jobName" class="form-control" type="text" placeholder="请输入定时任务名称">
                    </div>
                </div>

                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">执行周期：</label>
                    <div class="col-sm-8">
                        <select id="cycleType" class="form-control m-b" onchange="updateCron()">
                            <option value="daily">每天</option>
                            <option value="weekly">每周</option>
                            <option value="monthly">每月</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">执行时间：</label>
                    <div class="col-sm-8">
                        <div class="input-group date">
                            <span class="input-group-addon"><i class="fa fa-clock-o"></i></span>
                            <input type="text" class="form-control" id="execTime" value="02:00" placeholder="选择时间"
                                readonly>
                        </div>
                    </div>
                </div>

                <input type="hidden" name="cronExpression" id="cronExpression">
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: datetimepicker-js" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/report";
        var type = [[${ type }]];

        $(function () {
            if (type == 'manual') {
                $("#manual-area").show();
                $("#job-task-area").hide();
                $("#schedule-area").hide();
                loadCompanies();
                $("#companyId").on("change", onCompanyChange);
            } else if (type == 'job') {
                $("#manual-area").hide();
                $("#job-task-area").show();
                $("#schedule-area").show();
                $("#jobTaskId").prop("required", true);
                $("input[name='jobName']").prop("required", true);
                layui.use('laydate', function () {
                    var laydate = layui.laydate;
                    laydate.render({
                        elem: '#execTime',
                        type: 'time',
                        format: 'HH:mm',
                        done: function (value, date) {
                            updateCron();
                        }
                    });
                });
            }
        });

        function loadCompanies() {
            $.ajax({
                url: prefix + "/companies",
                type: "get",
                success: function (res) {
                    var html = '<option value="">请选择客户</option>';
                    if (res.code == web_status.SUCCESS && res.data) {
                        $.each(res.data, function (i, company) {
                            html += '<option value="' + company.companyId + '">' + (company.companyName || '') + '</option>';
                        });
                    }
                    $("#companyId").html(html);
                    resetTaskSelect(true);
                }
            });
        }

        function onCompanyChange() {
            var companyId = $("#companyId").val();
            resetTaskSelect(!companyId);
            $("#taskEmptyTip").hide();
            if (!companyId) {
                return;
            }
            $("#manualTaskId").prop("disabled", true);
            $.ajax({
                url: prefix + "/tasks",
                type: "get",
                data: { companyId: companyId },
                success: function (res) {
                    var html = '<option value="">请选择维保任务</option>';
                    var tasks = (res.code == web_status.SUCCESS && res.data) ? res.data : [];
                    if (!tasks.length) {
                        $("#manualTaskId").html(html).prop("disabled", true);
                        $("#taskEmptyTip").show();
                        return;
                    }
                    $.each(tasks, function (i, task) {
                        html += '<option value="' + task.taskId + '">' + formatTaskLabel(task) + '</option>';
                    });
                    $("#manualTaskId").html(html).prop("disabled", false);
                },
                error: function () {
                    resetTaskSelect(true);
                    $.modal.alertError("加载维保任务失败");
                }
            });
        }

        function resetTaskSelect(disabled) {
            $("#manualTaskId").html('<option value="">请先选择客户</option>').val('').prop("disabled", !!disabled);
            $("#taskEmptyTip").hide();
        }

        /** 任务名称（计划开始日期或任务ID），便于同名任务区分 */
        function formatTaskLabel(task) {
            var name = task.taskName || ('任务' + task.taskId);
            var suffix = '';
            if (task.planStartTime) {
                suffix = String(task.planStartTime).substring(0, 10);
            } else if (task.taskId != null) {
                suffix = 'ID:' + task.taskId;
            }
            return suffix ? (name + '（' + suffix + '）') : name;
        }

        function updateCron() {
            var cycle = $("#cycleType").val();
            var time = $("#execTime").val();
            if (!time) time = "02:00";
            var parts = time.split(":");
            var hour = parts[0];
            var minute = parts[1];
            var second = "0";

            var cron = "";
            if (cycle == 'daily') {
                cron = second + " " + minute + " " + hour + " * * ?";
            } else if (cycle == 'weekly') {
                cron = second + " " + minute + " " + hour + " ? * MON";
            } else if (cycle == 'monthly') {
                cron = second + " " + minute + " " + hour + " 1 * ?";
            }
            $("#cronExpression").val(cron);
        }

        function submitHandler() {
            if (type == 'manual') {
                var companyId = $("#companyId").val();
                var taskId = $("#manualTaskId").val();
                if (!companyId) {
                    $.modal.alertWarning("请选择客户名称");
                    return;
                }
                if (!taskId) {
                    $.modal.alertWarning("请选择维保任务");
                    return;
                }
                $.operate.save(prefix + "/generate", { companyId: companyId, taskId: taskId });
                return;
            }

            if ($.validate.form()) {
                var taskId = $("#jobTaskId").val();
                if (!taskId) {
                    $.modal.alertWarning("请选择维保任务");
                    return;
                }
                updateCron();
                $.operate.save(prefix + "/addJob", {
                    taskId: taskId,
                    cronExpression: $("#cronExpression").val(),
                    jobName: $("input[name='jobName']").val()
                });
            }
        }
    </script>
</body>

</html>
