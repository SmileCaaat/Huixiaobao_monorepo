<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:include="include :: header('维保报告配置')" />
    <th:block th:include="include :: datetimepicker-css" />
</head>

<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-report-config">
            <input type="hidden" id="type" name="type" th:value="${param.type}" />

            <div class="form-group">
                <label class="col-sm-3 control-label is-required">维保任务：</label>
                <div class="col-sm-8">
                    <select name="taskId" class="form-control m-b" required>
                        <option value="">请选择维保任务</option>
                        <option th:each="task : ${tasks}" th:value="${task.taskId}" th:text="${task.taskName}"></option>
                    </select>
                </div>
            </div>

            <div id="schedule-area" style="display: none;">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">任务名称：</label>
                    <div class="col-sm-8">
                        <input name="jobName" class="form-control" type="text" placeholder="请输入定时任务名称" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">执行周期：</label>
                    <div class="col-sm-8">
                        <select id="cycleType" class="form-control m-b" onchange="updateCron()">
                            <option value="daily">每天</option>
                            <option value="weekly">每周</option>
                            <option value="monthly">每月</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">执行时间：</label>
                    <div class="col-sm-8">
                        <div class="input-group date">
                            <span class="input-group-addon"><i class="fa fa-clock-o"></i></span>
                            <input type="text" class="form-control" id="execTime" value="02:00" placeholder="选择时间"
                                readonly>
                        </div>
                    </div>
                </div>

                <input type="hidden" name="cronExpression" id="cronExpression">
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: datetimepicker-js" />
    <script th:inline="javascript">
        var prefix = ctx + "fire/report";
        var type = [[${ param.type }]];

        $(function () {
            if (type == 'job') {
                $("#schedule-area").show();
                // 初始化时间选择器
                layui.use('laydate', function () {
                    var laydate = layui.laydate;
                    laydate.render({
                        elem: '#execTime',
                        type: 'time',
                        format: 'HH:mm',
                        done: function (value, date) {
                            updateCron();
                        }
                    });
                });
            }
        });

        function updateCron() {
            var cycle = $("#cycleType").val();
            var time = $("#execTime").val(); // HH:mm
            if (!time) time = "02:00";
            var parts = time.split(":");
            var hour = parts[0];
            var minute = parts[1];
            var second = "0";

            var cron = "";
            // 秒 分 时 日 月 周
            if (cycle == 'daily') {
                cron = second + " " + minute + " " + hour + " * * ?";
            } else if (cycle == 'weekly') {
                cron = second + " " + minute + " " + hour + " ? * MON"; // 默认周一
            } else if (cycle == 'monthly') {
                cron = second + " " + minute + " " + hour + " 1 * ?"; // 默认每月1号
            }
            $("#cronExpression").val(cron);
        }

        function submitHandler() {
            if ($.validate.form()) {
                if (type == 'manual') {
                    // 手动生成
                    var taskId = $("select[name='taskId']").val();
                    $.operate.save(prefix + "/generate", { taskId: taskId });
                } else {
                    // 定时任务
                    updateCron();
                    $.operate.save(prefix + "/addJob", $('#form-report-config').serialize());
                }
            }
        }
    </script>
</body>

</html>
