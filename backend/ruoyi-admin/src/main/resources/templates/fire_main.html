<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消防设备管理系统 - 首页</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link href="../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet" />
    <link href="../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet" />
    <link href="../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet" />
    <style>
        :root {
            --fire-red: #dc3545;
            --fire-gradient: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
        }

        body.fire-theme {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
        }

        .fire-dashboard {
            padding: 20px;
        }

        .fire-header {
            background: var(--fire-gradient);
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(220, 53, 69, 0.3);
        }

        .fire-header h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .fire-header .header-info {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-top: 8px;
        }

        .fire-header .header-icon {
            font-size: 50px;
            color: rgba(255, 255, 255, 0.9);
        }

        .stat-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border-left: 5px solid;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .stat-card.card-primary {
            border-left-color: #007bff;
        }

        .stat-card.card-success {
            border-left-color: #28a745;
        }

        .stat-card.card-warning {
            border-left-color: #ffc107;
        }

        .stat-card.card-danger {
            border-left-color: #dc3545;
        }

        .stat-card .stat-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 60px;
            opacity: 0.15;
        }

        .stat-card.card-primary .stat-icon {
            color: #007bff;
        }

        .stat-card.card-success .stat-icon {
            color: #28a745;
        }

        .stat-card.card-warning .stat-icon {
            color: #ffc107;
        }

        .stat-card.card-danger .stat-icon {
            color: #dc3545;
        }

        .stat-card .stat-number {
            font-size: 42px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }

        .stat-card.card-primary .stat-number {
            color: #007bff;
        }

        .stat-card.card-success .stat-number {
            color: #28a745;
        }

        .stat-card.card-warning .stat-number {
            color: #ffc107;
        }

        .stat-card.card-danger .stat-number {
            color: #dc3545;
        }

        .stat-card .stat-title {
            font-size: 14px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .info-panel .panel-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .info-panel .panel-header i {
            font-size: 24px;
            margin-right: 12px;
            color: var(--fire-red);
        }

        .info-panel .panel-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .status-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .status-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .status-item .status-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 22px;
            color: white;
        }

        .status-item .status-icon.bg-success {
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        .status-item .status-icon.bg-warning {
            background: linear-gradient(135deg, #ffc107, #fd7e14);
        }

        .status-item .status-icon.bg-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
        }

        .status-item .status-info h4 {
            margin: 0 0 5px 0;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .status-item .status-info p {
            margin: 0;
            font-size: 13px;
            color: #6c757d;
        }

        .status-item .status-count {
            margin-left: auto;
            font-size: 24px;
            font-weight: 700;
        }

        .status-item .status-count.text-success {
            color: #28a745;
        }

        .status-item .status-count.text-warning {
            color: #ffc107;
        }

        .status-item .status-count.text-danger {
            color: #dc3545;
        }

        .quick-entry {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 15px;
            background: #f8f9fa;
            border-radius: 15px;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-bottom: 15px;
        }

        .quick-entry:hover {
            background: var(--fire-gradient);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(220, 53, 69, 0.3);
            text-decoration: none;
        }

        .quick-entry:hover i,
        .quick-entry:hover span {
            color: white;
        }

        .quick-entry i {
            font-size: 36px;
            color: var(--fire-red);
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .quick-entry span {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            transition: all 0.3s ease;
        }

        .alert-item {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe5e5 100%);
            border-left: 4px solid var(--fire-red);
        }

        .alert-item.warning-type {
            background: linear-gradient(135deg, #fffdf5 0%, #fff3cd 100%);
            border-left-color: #ffc107;
        }

        .alert-item.info-type {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-left-color: #17a2b8;
        }

        .alert-item .alert-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--fire-red);
            color: white;
            margin-right: 12px;
            font-size: 14px;
            flex-shrink: 0;
        }

        .alert-item.warning-type .alert-icon {
            background: #ffc107;
        }

        .alert-item.info-type .alert-icon {
            background: #17a2b8;
        }

        .alert-item .alert-content h5 {
            margin: 0 0 3px 0;
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        .alert-item .alert-content p {
            margin: 0;
            font-size: 11px;
            color: #6c757d;
        }

        .alert-item .alert-time {
            margin-left: auto;
            font-size: 11px;
            color: #999;
            white-space: nowrap;
        }

        .progress-wrapper {
            margin-bottom: 20px;
        }

        .progress-wrapper .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .progress-wrapper .progress-label span:first-child {
            color: #333;
            font-weight: 500;
        }

        .progress-wrapper .progress-label span:last-child {
            color: #6c757d;
        }

        .progress {
            height: 10px;
            border-radius: 5px;
            background: #e9ecef;
        }

        .progress-bar {
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .fire-header h1 {
                font-size: 20px;
            }

            .stat-card .stat-number {
                font-size: 32px;
            }
        }
    </style>
</head>

<body class="fire-theme">
    <div class="fire-dashboard">
        <!-- 头部 -->
        <div class="fire-header">
            <div class="row">
                <div class="col-sm-8">
                    <h1><i class="fa fa-fire"></i> 消防设备管理系统</h1>
                    <div class="header-info">
                        <i class="fa fa-clock-o"></i> 系统运行状态：正常 |
                        <i class="fa fa-user"></i> 欢迎您，<span
                            th:text="${@permission.getPrincipalProperty('userName')}">管理员</span> |
                        <i class="fa fa-calendar"></i> <span id="currentDate"></span>
                    </div>
                </div>
                <div class="col-sm-4 text-right">
                    <i class="fa fa-shield header-icon"></i>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="row">
            <div class="col-sm-6 col-md-3">
                <div class="stat-card card-primary">
                    <i class="fa fa-building stat-icon"></i>
                    <div class="stat-number" id="companyCount">-</div>
                    <div class="stat-title">公司总数</div>
                </div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="stat-card card-success">
                    <i class="fa fa-building-o stat-icon"></i>
                    <div class="stat-number" id="buildingCount">-</div>
                    <div class="stat-title">建筑总数</div>
                </div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="stat-card card-warning">
                    <i class="fa fa-fire-extinguisher stat-icon"></i>
                    <div class="stat-number" id="equipmentCount">-</div>
                    <div class="stat-title">设备总数</div>
                </div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="stat-card card-danger">
                    <i class="fa fa-exclamation-triangle stat-icon"></i>
                    <div class="stat-number" id="expiringSoonCount">-</div>
                    <div class="stat-title">即将过期</div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- 设备状态概览 -->
            <div class="col-md-6">
                <div class="info-panel">
                    <div class="panel-header">
                        <i class="fa fa-pie-chart"></i>
                        <h3>设备状态概览</h3>
                    </div>
                    <div class="status-item">
                        <div class="status-icon bg-success">
                            <i class="fa fa-check"></i>
                        </div>
                        <div class="status-info">
                            <h4>有效期内</h4>
                            <p>设备在有效期内正常</p>
                        </div>
                        <div class="status-count text-success" id="inDateCount">-</div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon bg-warning">
                            <i class="fa fa-exclamation"></i>
                        </div>
                        <div class="status-info">
                            <h4>即将过期</h4>
                            <p>30天内将到期，请及时处理</p>
                        </div>
                        <div class="status-count text-warning" id="expiringSoonCountDetail">-</div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon bg-danger">
                            <i class="fa fa-times"></i>
                        </div>
                        <div class="status-info">
                            <h4>已过期</h4>
                            <p>设备已超出有效期</p>
                        </div>
                        <div class="status-count text-danger" id="expiredCount">-</div>
                    </div>

                    <!-- 设备健康度 -->
                    <div style="margin-top: 25px;">
                        <h4 style="font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #333;">
                            <i class="fa fa-heartbeat" style="color: var(--fire-red);"></i> 设备健康度
                        </h4>
                        <div class="progress-wrapper">
                            <div class="progress-label">
                                <span>有效期内占比</span>
                                <span id="inDatePercent">0%</span>
                            </div>
                            <div class="progress">
                                <div id="inDatePercentBar" class="progress-bar bg-success" role="progressbar"
                                    style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="progress-wrapper">
                            <div class="progress-label">
                                <span>即将过期占比</span>
                                <span id="expiringSoonPercent">0%</span>
                            </div>
                            <div class="progress">
                                <div id="expiringSoonPercentBar" class="progress-bar bg-warning" role="progressbar"
                                    style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="progress-wrapper">
                            <div class="progress-label">
                                <span>已过期占比</span>
                                <span id="expiredPercent">0%</span>
                            </div>
                            <div class="progress">
                                <div id="expiredPercentBar" class="progress-bar bg-danger" role="progressbar"
                                    style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 快捷入口 + 预警 -->
            <div class="col-md-6">
                <div class="info-panel">
                    <div class="panel-header">
                        <i class="fa fa-th-large"></i>
                        <h3>快捷入口</h3>
                    </div>
                    <div class="row">
                        <div class="col-xs-6 col-sm-3">
                            <a href="javascript:void(0)" onclick="openMenu('/fire/company', '公司信息')"
                                class="quick-entry">
                                <i class="fa fa-building"></i>
                                <span>公司信息</span>
                            </a>
                        </div>
                        <div class="col-xs-6 col-sm-3">
                            <a href="javascript:void(0)" onclick="openMenu('/fire/building', '建筑信息')"
                                class="quick-entry">
                                <i class="fa fa-building-o"></i>
                                <span>建筑信息</span>
                            </a>
                        </div>
                        <div class="col-xs-6 col-sm-3">
                            <a href="javascript:void(0)" onclick="openMenu('/fire/equipment', '设备信息')"
                                class="quick-entry">
                                <i class="fa fa-fire-extinguisher"></i>
                                <span>设备信息</span>
                            </a>
                        </div>
                        <div class="col-xs-6 col-sm-3">
                            <a href="javascript:void(0)" onclick="openMenu('/fire/task', '维保任务')" class="quick-entry">
                                <i class="fa fa-tasks"></i>
                                <span>维保任务</span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 预警列表 -->
                <div class="info-panel">
                    <div class="panel-header">
                        <i class="fa fa-bell"></i>
                        <h3>设备预警</h3>
                    </div>

                    <div id="alertListContainer">
                        <!-- 动态插入 -->
                    </div>

                    <div id="noAlert" style="text-align:center; padding:30px; color:#999; display:none;">
                        <i class="fa fa-check-circle fa-3x" style="color:#28a745;"></i>
                        <p style="margin-top:10px;">暂无预警信息</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <script th:src="@{/ruoyi/js/ry-ui.js}"></script>

    <script>
        var ctx = "/";

        function updateDateTime() {
            var now = new Date();
            var dateStr = now.getFullYear() + '-' +
                ('0' + (now.getMonth() + 1)).slice(-2) + '-' +
                ('0' + now.getDate()).slice(-2) + ' ' +
                ('0' + now.getHours()).slice(-2) + ':' +
                ('0' + now.getMinutes()).slice(-2) + ':' +
                ('0' + now.getSeconds()).slice(-2);
            document.getElementById('currentDate').textContent = dateStr;
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // 加载数据
        $(function () {
            loadStats();
        });

        function loadStats() {
            $.ajax({
                url: ctx + "fire/stats/home",
                type: "get",
                dataType: "json",
                success: function (res) {
                    console.log("AJAX Success:", res);
                    if (res.code == 0) {
                        // 顶部卡片
                        $("#companyCount").text(res.companyCount);
                        $("#buildingCount").text(res.buildingCount);
                        $("#equipmentCount").text(res.equipmentCount);
                        $("#expiringSoonCount").text(res.expiringSoonCount);

                        // 状态概览
                        $("#inDateCount").text(res.inDateCount);
                        $("#expiringSoonCountDetail").text(res.expiringSoonCount);
                        $("#expiredCount").text(res.expiredCount);

                        // 进度条
                        $("#inDatePercent").text(res.inDatePercent + "%");
                        $("#inDatePercentBar").css("width", res.inDatePercent + "%");

                        $("#expiringSoonPercent").text(res.expiringSoonPercent + "%");
                        $("#expiringSoonPercentBar").css("width", res.expiringSoonPercent + "%");

                        $("#expiredPercent").text(res.expiredPercent + "%");
                        $("#expiredPercentBar").css("width", res.expiredPercent + "%");

                        // 预警列表
                        var html = "";
                        var hasAlerts = false;

                        // 已过期
                        if (res.expiredList && res.expiredList.length > 0) {
                            hasAlerts = true;
                            $.each(res.expiredList, function (i, item) {
                                html += `
                                <div class="alert-item">
                                    <div class="alert-icon"><i class="fa fa-times"></i></div>
                                    <div class="alert-content">
                                        <h5>${item.equipmentName}</h5>
                                        <p><span>${item.buildingName}</span> - 已过期</p>
                                    </div>
                                    <div class="alert-time">${item.expireDate ? item.expireDate.substring(5, 10) : ''}</div>
                                </div>`;
                            });
                        }

                        // 即将过期
                        if (res.expiringSoonList && res.expiringSoonList.length > 0) {
                            hasAlerts = true;
                            $.each(res.expiringSoonList, function (i, item) {
                                html += `
                                <div class="alert-item warning-type">
                                    <div class="alert-icon"><i class="fa fa-exclamation"></i></div>
                                    <div class="alert-content">
                                        <h5>${item.equipmentName}</h5>
                                        <p><span>${item.buildingName}</span> - 即将过期</p>
                                    </div>
                                    <div class="alert-time">${item.expireDate ? item.expireDate.substring(5, 10) : ''}</div>
                                </div>`;
                            });
                        }

                        $("#alertListContainer").html(html);
                        if (!hasAlerts) {
                            $("#noAlert").show();
                        }
                    } else {
                        console.error("加载数据失败: " + res.msg);
                    }
                },
                error: function (xhr) {
                    console.error("系统错误");
                },
                complete: function () {
                    $("#loadingMask").fadeOut();
                    $("#dashboardContent").fadeIn();
                }
            });
        }

        // 快捷入口跳转函数 - 模拟点击左侧菜单
        function openMenu(url, title) {
            try {
                // 在父窗口中查找对应的菜单项并点击
                var parentDoc = window.parent.document;
                var menuItems = parentDoc.querySelectorAll('a.menuItem');
                var found = false;

                for (var i = 0; i < menuItems.length; i++) {
                    var href = menuItems[i].getAttribute('href');
                    // 精确匹配URL
                    if (href && (href === url || href.endsWith(url))) {
                        // 先展开父级菜单
                        var parentLi = menuItems[i].closest('li');
                        if (parentLi) {
                            var parentUl = parentLi.closest('ul.nav-second-level, ul.nav-third-level');
                            if (parentUl) {
                                parentUl.classList.add('in');
                                var parentLiTop = parentUl.closest('li');
                                if (parentLiTop) {
                                    parentLiTop.classList.add('active');
                                }
                            }
                        }
                        // 模拟点击菜单
                        menuItems[i].click();
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    console.warn('未找到菜单项: ' + url);
                }
            } catch (e) {
                console.error('跳转失败:', e);
            }
        }
    </script>
</body>

</html>
